<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUB × Centific AIDF — AI Use Case Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* CUB Brand */
  --cub-blue:#2E3192;
  --cub-blue2:#3D42C0;
  --cub-blue-lt:#4F54D4;
  --cub-pink:#EC0677;
  --cub-pink-lt:#F5399B;
  /* UI Palette */
  --bg:#F2F3FB;
  --card:#FFFFFF;
  --card-hover:#FAFBFF;
  --border:#D8DAF0;
  --border-strong:#B8BBE8;
  --text:#0F1035;
  --text2:#2D2F6B;
  --text3:#5C5F99;
  --text4:#8B8EB8;
  --white:#FFFFFF;
  /* Accents */
  --green:#0D7A4B;
  --green-bg:#E8F8F1;
  --amber:#A05C00;
  --amber-bg:#FFF3DC;
  --red:#C0162A;
  --red-bg:#FDEDEF;
  --teal:#0B7A8A;
  --teal-bg:#E5F6F8;
  /* Tier colours */
  --qw-c:#0D7A4B;--qw-bg:#E8F8F1;
  --su-c:#2E3192;--su-bg:#ECEEFF;
  --tr-c:#7B1EA2;--tr-bg:#F5E8FF;
}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ─────── TOP BAR ─────── */
.topbar{background:var(--cub-blue);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(46,49,146,0.3)}
.tb-left{display:flex;align-items:center;gap:14px}
.cub-wordmark{display:flex;align-items:baseline;gap:0}
.cub-wm-cub{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:-0.02em;font-style:italic}
.cub-wm-sep{width:1px;height:20px;background:rgba(255,255,255,0.3);margin:0 10px;align-self:center}
.tb-aidf{font-size:12px;color:#B0B4E8;font-weight:500;letter-spacing:0.02em}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-pill{font-size:11px;color:#B0B4E8;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
.btn-add{background:var(--cub-pink);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;box-shadow:0 2px 8px rgba(236,6,119,0.35)}
.btn-add:hover{background:var(--cub-pink-lt);transform:translateY(-1px)}

/* ─────── BREADCRUMB ─────── */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text4)}
.bc-link{cursor:pointer;color:var(--cub-blue);font-weight:500}
.bc-link:hover{text-decoration:underline}
.bc-sep{color:var(--border-strong)}
.bc-cur{color:var(--text);font-weight:600}

/* ─────── LAYOUT ─────── */
.main{display:flex;flex:1;min-height:0}
.sidebar{width:252px;background:var(--white);border-right:1px solid var(--border);padding:10px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:28px;overflow-y:auto}

/* ─────── SIDEBAR ─────── */
.sb-label{font-size:10px;font-weight:700;color:var(--text4);padding:14px 18px 5px;letter-spacing:0.09em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;cursor:pointer;font-size:12.5px;color:var(--text3);border-left:3px solid transparent;transition:all 0.12s;gap:8px}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.active{background:#ECEEFF;color:var(--cub-blue);border-left-color:var(--cub-blue);font-weight:600}
.sb-name{flex:1;line-height:1.3}
.sb-count{font-size:10px;background:var(--bg);color:var(--text4);padding:2px 7px;border-radius:10px;min-width:26px;text-align:center;flex-shrink:0}
.sb-item.active .sb-count{background:var(--cub-blue);color:#fff}

/* ─────── LANDING HERO ─────── */
.hero{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;box-shadow:0 4px 24px rgba(46,49,146,0.07)}

.hero-top{background:linear-gradient(135deg,var(--cub-blue) 0%,#1E2270 50%,#252880 100%);padding:32px 36px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;position:relative;overflow:hidden}
.hero-top::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(236,6,119,0.15),transparent 65%);pointer-events:none}
.hero-top::after{content:'';position:absolute;bottom:-120px;left:30%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(78,84,212,0.2),transparent 65%);pointer-events:none}
.hero-left{flex:1;position:relative;z-index:1}
.hero-eyebrow{font-size:10px;font-weight:700;color:var(--cub-pink);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::before{content:'';width:24px;height:2px;background:var(--cub-pink)}
.hero-title{font-family:'DM Serif Display',serif;font-size:30px;color:#fff;line-height:1.2;margin-bottom:12px}
.hero-title span{color:var(--cub-pink);font-style:italic}
.hero-subtitle{font-size:13px;color:#B0B4E8;line-height:1.7;max-width:500px}
.hero-right{display:flex;flex-direction:column;gap:8px;flex-shrink:0;position:relative;z-index:1;min-width:200px}
.hero-badge{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;transition:all 0.15s}
.hb-title{font-size:10px;font-weight:700;color:var(--cub-pink);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.hb-sub{font-size:12px;color:#D0D4F0}

/* ─────── STATS ROW ─────── */
.stats-6{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-bottom:1px solid var(--border)}
.stat-cell{padding:18px 20px;border-right:1px solid var(--border);text-align:center}
.stat-cell:last-child{border-right:none}
.stat-num{font-family:'DM Serif Display',serif;font-size:20px;color:var(--cub-blue);font-weight:400;line-height:1}
.stat-label{font-size:10px;color:var(--text4);margin-top:4px;line-height:1.4}
.stat-note{font-size:9px;color:var(--green);font-weight:600;margin-top:2px}
.stat-note.pink{color:var(--cub-pink)}

/* ─────── CHARTS SECTION ─────── */
.charts-section{padding:24px 28px;background:var(--white)}
.charts-title{font-size:13px;font-weight:700;color:var(--cub-blue);margin-bottom:20px;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.charts-title::after{content:'';flex:1;height:1px;background:var(--border)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
.charts-grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
.chart-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-box-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px}

/* ─────── SIGNALS ─────── */
.signals-section{padding:0 28px 24px;background:var(--white);border-bottom-left-radius:16px;border-bottom-right-radius:16px}
.signals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.signal-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--cub-pink);border-radius:10px;padding:14px}
.signal-icon{font-size:20px;margin-bottom:8px}
.signal-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;line-height:1.3}
.signal-desc{font-size:11px;color:var(--text3);line-height:1.55}

/* ─────── TECH BAR ─────── */
.tech-bar{background:linear-gradient(90deg,#ECEEFF,#F0F1FF);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px}
.tech-label{font-size:10px;font-weight:700;color:var(--cub-blue);letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0}
.tech-text{font-size:12px;color:var(--text3);line-height:1.5}
.tech-text strong{color:var(--cub-blue)}

/* ─────── SUMMARY STATS ─────── */
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sum-card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--cub-blue);border-radius:10px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(46,49,146,0.05)}
.sum-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--cub-blue)}
.sum-label{font-size:11px;color:var(--text4);margin-top:4px}

/* ─────── DIVISION GRID ─────── */
.div-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;margin-bottom:20px}
.div-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--cub-blue);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.15s;position:relative;box-shadow:0 2px 8px rgba(46,49,146,0.04)}
.div-card:hover{box-shadow:0 6px 20px rgba(46,49,146,0.12);transform:translateY(-2px);border-color:var(--cub-blue)}
.div-num-badge{font-size:10px;font-weight:700;color:var(--cub-pink);background:#FDE8F2;padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:10px;letter-spacing:0.05em}
.div-name{font-family:'DM Serif Display',serif;font-size:16px;color:var(--cub-blue);margin-bottom:7px;padding-right:20px}
.div-desc{font-size:11.5px;color:var(--text3);line-height:1.55;margin-bottom:14px}
.div-stats{display:flex;gap:10px}
.dstat{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 12px;text-align:center}
.dstat-n{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cub-blue)}
.dstat-l{font-size:10px;color:var(--text4);margin-top:1px}
.div-arrow{position:absolute;top:20px;right:16px;font-size:18px;color:var(--border-strong);transition:all 0.15s}
.div-card:hover .div-arrow{color:var(--cub-pink);right:12px}

/* ─────── DEPT HERO ─────── */
.dept-hero{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--cub-blue);border-radius:12px;padding:22px;margin-bottom:20px;box-shadow:0 2px 8px rgba(46,49,146,0.05)}
.dept-hero-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--cub-blue);margin-bottom:5px}
.dept-hero-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#ECEEFF;color:var(--cub-blue)}
.badge-pink{background:#FDE8F2;color:var(--cub-pink)}
.badge-gray{background:var(--bg);color:var(--text4);border:1px solid var(--border)}
.badge-green{background:var(--green-bg);color:var(--green)}

/* ─────── SUBDEPT ─────── */
.subdept-block{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(46,49,146,0.04)}
.subdept-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;background:var(--bg);border-bottom:1px solid var(--border);transition:background 0.12s}
.subdept-head:hover{background:#ECEEFF}
.subdept-head-title{font-size:13.5px;font-weight:600;color:var(--text2)}
.subdept-meta{display:flex;align-items:center;gap:8px}
.sdchev{font-size:11px;color:var(--text4);transition:transform 0.2s}
.sdchev.open{transform:rotate(180deg)}
.subdept-body{padding:18px;display:none}
.subdept-body.open{display:block}

/* ─────── USE CASE CARD ─────── */
.uc-card{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow 0.15s;background:var(--white)}
.uc-card:hover{box-shadow:0 3px 12px rgba(46,49,146,0.08)}
.uc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:12px}
.uc-head:hover{background:var(--bg)}
.uc-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.uc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.uc-dot.deep{background:var(--cub-blue)}
.uc-dot.brief{background:var(--cub-pink)}
.uc-name{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-code{font-size:10px;color:var(--text4);font-family:'DM Mono',monospace;margin-top:1px}
.uc-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tier{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px}
.tier-qw{background:var(--qw-bg);color:var(--qw-c)}
.tier-su{background:var(--su-bg);color:var(--su-c)}
.tier-tr{background:var(--tr-bg);color:var(--tr-c)}
.rbi-tag{background:#FFF3DC;color:#8B5E00;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.uc-chev{font-size:11px;color:var(--text4)}

/* ─────── UC BODY ─────── */
.uc-body{display:none;border-top:1px solid var(--border)}
.uc-body.open{display:block}
.uc-inner{padding:20px;background:linear-gradient(180deg,#FAFBFF,#F5F6FE)}

/* CUB Context */
.cub-ctx{background:var(--cub-blue);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px}
.ctx-icon{font-size:18px;flex-shrink:0}
.ctx-eyebrow{font-size:9px;font-weight:700;color:var(--cub-pink);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:4px}
.ctx-text{font-size:12.5px;color:#D0D4F8;line-height:1.65}

/* 2-col */
.uc-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.uc-sec{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px}
.uc-sec-title{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:9px}
.uc-sec-body{font-size:12.5px;color:var(--text);line-height:1.65}

/* Data readiness */
.di-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px;color:var(--text2)}
.dr{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dr-g{background:#22C55E}.dr-a{background:#F59E0B}.dr-r{background:#EF4444}
.dr-legend{display:flex;gap:12px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.drl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text4)}

/* Outcomes */
.oc-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12.5px;color:var(--text)}
.oc-check{color:var(--green);font-size:13px;flex-shrink:0;margin-top:2px;font-weight:700}

/* Dependency */
.dep-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.dep-title{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px}
.dep-chips{display:flex;gap:8px;flex-wrap:wrap}
.dep-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.dep-builds{background:var(--amber-bg);color:var(--amber);border:1px solid #FFD580}
.dep-enables{background:var(--teal-bg);color:var(--teal);border:1px solid #99DDE4}
.dep-chip-lbl{font-size:9px;font-weight:700;opacity:0.65;text-transform:uppercase}

/* RBI note */
.rbi-note{background:linear-gradient(135deg,#FFF8E8,#FFF3D0);border-left:3px solid #D97706;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px}
.rbi-note-title{font-size:10px;font-weight:700;color:#8B5E00;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px}
.rbi-note-body{font-size:12.5px;color:#6B4800;line-height:1.6}

/* Mockup */
.mockup-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(46,49,146,0.08)}
.mockup-bar{background:var(--cub-blue);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.mockup-bar-title{font-size:11.5px;font-weight:600;color:#fff}
.mockup-illustrative{font-size:9px;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.15);padding:3px 10px;border-radius:10px;letter-spacing:0.07em;text-transform:uppercase;border:1px solid rgba(245,158,11,0.3)}
.mockup-body{padding:16px}

/* Brief UC */
.brief-uc{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;background:var(--white);border:1px solid var(--border);margin-bottom:8px;transition:all 0.12s}
.brief-uc:hover{border-color:var(--cub-blue);background:var(--bg)}
.brief-dot{width:6px;height:6px;border-radius:50%;background:var(--cub-pink);flex-shrink:0;margin-top:5px}
.brief-name{font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:2px}
.brief-desc{font-size:12px;color:var(--text3);line-height:1.5}

/* Section divider */
.sec-div{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.sec-div-line{flex:1;height:1px;background:var(--border)}
.sec-div-text{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap}

/* Add buttons */
.add-uc-btn{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1.5px dashed var(--border-strong);border-radius:8px;cursor:pointer;font-size:12px;color:var(--text4);background:transparent;width:100%;transition:all 0.15s;margin-top:10px;font-family:'DM Sans',sans-serif}
.add-uc-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}
.add-sd-btn{display:flex;align-items:center;gap:7px;padding:11px 16px;border:1.5px dashed var(--border-strong);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text4);background:transparent;width:100%;transition:all 0.15s;margin-top:14px;font-family:'DM Sans',sans-serif}
.add-sd-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}
.add-d-btn{display:flex;align-items:center;gap:7px;padding:13px 18px;border:1.5px dashed var(--border-strong);border-radius:12px;cursor:pointer;font-size:13px;color:var(--text4);background:var(--white);width:100%;transition:all 0.15s;margin-bottom:14px;font-family:'DM Sans',sans-serif;box-shadow:0 1px 4px rgba(46,49,146,0.04)}
.add-d-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}

/* Add form */
.add-form{background:var(--amber-bg);border:1.5px dashed #D97706;border-radius:10px;padding:18px;margin-top:10px;display:none}
.add-form.open{display:block}
.form-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:14px}
.form-row{margin-bottom:11px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 11px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;background:var(--white);font-family:'DM Sans',sans-serif;color:var(--text)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--cub-blue);box-shadow:0 0 0 3px rgba(46,49,146,0.1)}
.form-textarea{resize:vertical;min-height:80px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{background:var(--cub-blue);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save:hover{background:var(--cub-blue2)}
.btn-cancel{background:var(--white);color:var(--text3);border:1px solid var(--border-strong);padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Dept section in division view */
.dept-sec{margin-bottom:24px}
.dept-sec-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--cub-blue);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dept-sec-link{font-size:12px;font-weight:500;color:var(--cub-pink);cursor:pointer;font-family:'DM Sans',serif}
.dept-sec-link:hover{text-decoration:underline}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,16,53,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-box{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(46,49,146,0.25)}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cub-blue);margin-bottom:20px}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}

@media(max-width:900px){
  .sidebar{display:none}
  .stats-6{grid-template-columns:repeat(3,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .charts-grid-2{grid-template-columns:1fr}
  .signals-grid{grid-template-columns:1fr 1fr}
  .uc-2col{grid-template-columns:1fr}
  .sum-stats{grid-template-columns:repeat(2,1fr)}
}

 depts:5,subdepts:18,ucs:54,
 departments:[
  {id:'D3.1',name:'Gold Loan — Standalone Department',subdepts:[
   {id:'D3.1.2',name:'Gold Loan Portfolio Management',
    deepUCs:[{id:'3.1.2.A',name:'Gold Price Risk Management Intelligence — E2',tier:'Quick Win',rbi:true,
     cubCtx:'CUB\'s ₹14,330 Cr gold loan book is the largest single product concentration in the bank and the most directly exposed to a single external variable: the gold price. A 10% intraday fall in gold prices simultaneously affects the LTV of a significant portion of CUB\'s 875-branch gold loan portfolio, creating a systemic risk that manual monitoring cannot address at scale.',
     pain:'CUB\'s ₹14,330 Cr gold loan book is directly and immediately exposed to gold price movements. A 10% fall in gold prices increases effective LTV from say 68% to 76% — breaching the RBI 75% cap for a significant portion of the portfolio. Managing this across 875 branches relies on branch staff manually reviewing accounts when gold prices move significantly — impractical at this scale.',
     what:'AIDF builds a real-time Gold Price Risk Monitor for CUB\'s entire gold loan portfolio. Using live MCX/NCDEX gold price feeds, AIDF computes the current effective LTV for every active gold loan — updated intraday. System maintains a heat map showing accounts above 75% LTV (regulatory breach — immediate action), 70–75% LTV (at-risk — monitoring required), and below 70% (comfortable). When gold prices move more than 3% intraday, AIDF automatically generates branch-wise action lists with specific accounts requiring margin calls or partial repayments.',
     dataInputs:[{l:'Finacle gold loan data — outstanding amount, original gold weight, appraisal value, packet details',dr:'g'},{l:'Live gold price feed — MCX spot price (real-time)',dr:'r'},{l:'Branch data — geographic mapping of gold loan book',dr:'g'},{l:'Customer contact data — verified phone for margin call notifications',dr:'g'}],
     outcomes:['Real-time LTV compliance monitoring across ₹14,330 Cr book — capability CUB currently cannot achieve manually','Gold price event response time reduced from days to hours across 875 branches','Regulatory LTV breach elimination — systematic monitoring prevents ad hoc oversights leading to RBI findings','Portfolio-level gold price sensitivity quantification for treasury and ALCO'],
     buildsOn:[],enables:['3.1.4.A — Auction Optimisation Engine'],
     rbiNote:'RBI\'s 2024 Master Direction on Gold Loans includes specific requirements for LTV monitoring and breach management. CUB\'s scale makes systematic real-time LTV monitoring a primary supervisory expectation.',mockup:'gold'}],
    briefUCs:[

     {name:'Portfolio concentration analytics',desc:'Branch-wise, scheme-wise, and ticket-size-wise gold loan concentration monitoring with alerts when any dimension approaches risk policy limits.'},

   {id:'D3.1.1',name:'Gold Loan Origination & Appraisal',
    deepUCs:[{id:'3.1.1.A',name:'AI-Assisted Gold Purity & LTV Verification',tier:'Quick Win',rbi:true,
     cubCtx:'CUB\'s gold loan book of ₹14,330 Cr spread across 875 branches — with 67% of branches in Tamil Nadu\'s rural and semi-urban districts — means that appraiser quality is the single most important control in the gold loan business. Even a 0.5% fake gold rate across this book represents ₹70+ Cr of exposure to complete loss at NPA.',
     pain:'Gold loan appraisal at 875 branches relies entirely on the branch appraiser\'s physical assessment. Appraiser skill varies significantly. Fake gold — gold-plated copper or bronze ornaments — passes through inconsistent appraisal and is typically detected only at auction when the NPA gold turns out to be near-worthless.',
     what:'AIDF builds a Gold Loan Appraisal Intelligence layer: (1) Appraiser quality monitoring — tracks each appraiser\'s historical accuracy comparing appraised value at origination against realised value at auction for NPA accounts; (2) Anomaly detection — identifies packets where appraised value is statistically inconsistent with declared ornament description, weight, purity, customer profile, and branch appraisal patterns — flagged for re-appraisal before disbursement.',
     dataInputs:[{l:'Finacle gold loan data — packet details, appraised value, appraiser ID, branch',dr:'g'},{l:'Auction realisation data — NPA accounts: actual gold value vs appraised',dr:'g'},{l:'Live gold price data — MCX spot price for benchmarking',dr:'r'},{l:'Branch appraisal history — historical accuracy by appraiser',dr:'g'}],
     outcomes:['Fake gold detection improvement — estimated 3–5x better than current manual process','Appraiser quality management — data-driven training and supervision targeting','Reduction in NPA gold revaluation losses','Regulatory compliance — RBI 2024 Master Direction on Gold Loans emphasises robust appraisal controls'],
     buildsOn:[],enables:['3.1.2.A — Gold Price Risk Management','3.1.3.A — Vault Audit Intelligence'],
     rbiNote:'RBI\'s Master Direction on Gold Loans (2024 revision) specifically addresses appraisal quality requirements and mandates banks to demonstrate robust valuation controls.',mockup:null}],
    briefUCs:[
     {name:'Seasonal demand forecasting',desc:'AIDF predicts gold loan demand by branch and geography for next 30–60 days based on crop calendar, festival season, gold price trends — enabling proactive liquidity and staffing planning.'},
     {name:'LTV breach early alert',desc:'Real-time monitoring of gold price against outstanding loan amounts, with automated customer notification and branch alert when any account approaches the 75% RBI LTV cap.'},
     {name:'Multi-pledge detection',desc:'AI cross-referencing of ornament descriptions and customer profiles across branches to detect the same gold pledged at multiple CUB branches — a significant fraud pattern in large gold loan portfolios.'},
     {name:'Gold loan scheme optimisation',desc:'AI recommendation of the optimal gold loan scheme for each borrower (bullet repayment, monthly interest, EMI, OD) based on income type, cash flow pattern, and crop cycle timing.'}]}
  ]},
  {id:'D3.2',name:'Agricultural Term Loans',subdepts:[
   {id:'D3.2.1',name:'Crop Loans',

     cubCtx:'CUB\'s agri portfolio is concentrated in Tamil Nadu\'s Cauvery delta — one of India\'s most agriculturally productive but also most drought-vulnerable geographies. CUB\'s agri NPAs have a strong seasonal and district-level correlation with monsoon performance — a relationship that satellite data can quantify with 6–8 week lead time over ground-level repayment failure signals.',

{id:'D1',num:'1',name:'Retail Banking',color:'#0B6E82',
 desc:'CASA, FD/RD, home loans, LAP, personal loans, vehicle loans, credit cards (new programme — recently launched), digital banking channels, retail collections.',
 depts:6,subdepts:19,ucs:52,
 departments:[
  {id:'D1.1',name:'Liability Products',subdepts:[
   {id:'D1.1.1',name:'Savings & Current Accounts (CASA)',
    deepUCs:[{id:'1.1.1.A',name:'CASA Attrition Prediction & Retention Engine — E3',tier:'Quick Win',rbi:false,
     cubCtx:'CUB\'s CASA base in Tamil Nadu is under competitive pressure from private sector banks expanding in the state and small finance banks targeting the same customer segments. CASA is CUB\'s lowest-cost funding source and its most valuable relationship anchor — every lost CASA customer is both a funding cost increase and a cross-sell opportunity permanently closed.',
     pain:'CUB loses CASA customers to competitors but detects departure only after the account has gone dormant or been closed. The warning signs are visible months before closure: declining balance, falling transaction frequency, salary credit stopping, standing instructions being cancelled. Systematic monitoring across 875 branches is impossible manually.',
     what:'AIDF builds a CASA Attrition Predictor generating monthly churn probability score for every active CUB savings and current account. 20+ behavioural signals: 3-month balance trend (declining sharply), transaction frequency change, salary credit pattern, standing instruction cancellations, digital channel usage drop, outward fund transfer to other banks increasing, recent customer complaints. Accounts with high churn scores receive targeted retention interventions calibrated to the detected reason for churn risk.',
     dataInputs:[{l:'Finacle CASA account data — daily balance, transactions, credits, debits',dr:'g'},{l:'Mobile banking login data — engagement frequency',dr:'g'},{l:'Complaint history — CRM system',dr:'g'},{l:'Product holding data — current product penetration',dr:'g'},{l:'Customer demographic data — CBS master',dr:'g'}],
     outcomes:['30–45 day advance warning of CASA attrition for 70%+ of at-risk accounts','20–30% improvement in retention rate for contacted customers','CASA balance improvement — retaining high-value customers whose balances were declining','Revenue protection — CASA is CUB\'s lowest-cost funding source'],
     buildsOn:[],enables:['1.1.2.A — FD Renewal Prediction','1.2.1.A — Home Loan Propensity Model'],
     rbiNote:null,mockup:null}],
    briefUCs:[
     {name:'CASA upgrade propensity',desc:'Identifying savings account customers likely to respond to current account upgrades based on transaction volumes and business activity signals — growing fee income and deepening relationships.'},
     {name:'Dormant account reactivation campaigns',desc:'AI-driven identification of dormant accounts with highest reactivation probability and personalised outreach triggers — regulatory compliance and revenue recovery combined.'},
     {name:'Balance concentration risk monitoring',desc:'Identifying accounts where a single large depositor\'s balance is a significant proportion of branch CASA base — providing early warning of concentration risk.'}]},
   {id:'D1.1.2',name:'Fixed & Recurring Deposits',
    deepUCs:[{id:'1.1.2.A',name:'FD Renewal Prediction & Proactive Retention',tier:'Quick Win',rbi:false,
     cubCtx:'CUB\'s LCR at 269% — the highest in its peer universe — reflects a strong deposit franchise. Maintaining this franchise requires active FD renewal management. The 15-day maturity notice that currently triggers the renewal conversation is structurally too late — the retention decision is effectively made 30–45 days before maturity.',
     pain:'Current process sends a system-generated maturity notice 15 days before due date. Renewal rate depends on whether the branch follows up. Many FDs — particularly those of older customers or smaller branches — mature and are withdrawn without any proactive retention conversation.',
     what:'AIDF builds FD Retention Intelligence: 45 days before each FD maturity, generates renewal probability score and recommended retention action. High-value FDs with low renewal probability → personal RM call with tailored renewal offer. Medium probability → automated personalised SMS/WhatsApp with current best rate and one-tap renewal via mobile banking. Low-value high-probability → auto-renewed on standard terms. Also identifies FD customers holding multiple FDs at other banks — generates share-of-wallet upgrade offers.',
     dataInputs:[{l:'Finacle FD data — maturity date, amount, customer profile, renewal history',dr:'g'},{l:'Mobile banking engagement data — digital interaction frequency',dr:'g'},{l:'Customer relationship data — product holding, tenure, value',dr:'g'},{l:'Market rate data — competitor FD rates for benchmarking',dr:'a'},{l:'Bureau data — FDs at other institutions',dr:'g'}],
     outcomes:['FD renewal rate improvement of 8–12 percentage points','Advance identification of large FD maturity events for treasury/ALM liquidity planning','Personalised renewal offers improve acceptance vs standard maturity notice','Wallet share improvement for multi-bank FD customers'],
     buildsOn:['1.1.1.A — CASA Attrition Predictor'],enables:['4.1.1.A — ALM Dashboard'],
     rbiNote:null,mockup:null}],
    briefUCs:[
     {name:'TDS optimisation advisory',desc:'AI identification of customers approaching ₹50,000 interest threshold (TDS trigger) who could benefit from Form 15G/H filing reminders — a genuine customer service reducing complaint calls.'},
     {name:'FD-backed loan propensity',desc:'Identifying FD holders with potential short-term liquidity needs who would benefit from OD against FD rather than breaking their FD — retaining the deposit and generating loan income.'},
     {name:'Bulk deposit early warning',desc:'Identifying large institutional FD customers approaching maturity with behavioural signals suggesting non-renewal — enabling ALCO to plan for liquidity impact.'}]}
  ]},
  {id:'D1.2',name:'Retail Asset Products',subdepts:[
   {id:'D1.2.1',name:'Home Loan & LAP',
    deepUCs:[{id:'1.2.1.A',name:'Home Loan / LAP Propensity Model — M1',tier:'Scale-Up',rbi:false,
     cubCtx:'CUB has set up a dedicated new sales vertical to focus on secured retail lending — home loans and LAP — signalling a strategic priority. The quality of leads fed to this sales vertical will determine its ROI. Existing CUB customers have known repayment behaviour, verified income, and an established relationship — they are materially better quality leads than cold DSA sources.',
     pain:'CUB\'s home loan and LAP business relies on DSA leads (expensive, quality-variable), walk-ins (unpredictable), and referrals (underutilised). CUB has a large CASA and business banking customer base but no systematic intelligence on which existing customers are approaching home loan or LAP decision points. Competitors with better analytics are reaching CUB\'s own customers first.',
     what:'AIDF builds a Home Loan and LAP Propensity model scoring every eligible CUB CASA customer monthly. Propensity signals: recent large savings accumulation (down payment building), salary increment pattern (increased affordability), age bracket 28–42 (peak home buying years), bureau data (property enquiries, new mortgage at other banks), business banking customers with unlevered property (LAP opportunity), and life event triggers (marriage, first child — detectable via account naming changes, cheque payee patterns).',
     dataInputs:[{l:'Finacle CASA and loan data — account behaviour, product holdings',dr:'g'},{l:'Customer demographics — age, occupation, location (CBS master)',dr:'g'},{l:'Bureau data — property enquiries, new mortgage at other banks',dr:'g'},{l:'Digital banking behaviour — mobile banking engagement',dr:'g'},{l:'Life event proxy signals — account naming, cheque payee patterns',dr:'g'}],
     outcomes:['30–40% reduction in home loan customer acquisition cost vs DSA-sourced leads','Higher quality leads — existing customers approve and perform better than cold DSA leads','Home loan book growth acceleration — directly supporting CUB\'s new secured retail sales vertical'],
     buildsOn:['1.1.1.A — CASA Attrition Predictor'],enables:['5.2.1.A — Retail Credit Decision Support System'],
     rbiNote:null,mockup:null}],
    briefUCs:[
     {name:'Property market intelligence for LAP',desc:'AI tracking of Tamil Nadu property market trends by micro-market to inform LAP pricing, LTV setting, and collateral risk assessment.'},
     {name:'Balance transfer propensity model',desc:'Identifying existing home loan customers at competitor banks likely to consider balance transfer to CUB — using bureau signals (home loan at other bank, near reset dates).'},
     {name:'Construction-linked disbursement monitoring',desc:'For under-construction home loans with stage-wise disbursement, AI monitoring of construction progress signals to ensure disbursements align with actual construction.'}]},
   {id:'D1.2.5',name:'Credit Cards — New Programme (Recently Launched)',
    deepUCs:[
     {id:'1.2.5.A',name:'Credit Card Acquisition Scoring — Cold Start Solution',tier:'Quick Win',rbi:false,
      cubCtx:'CUB has recently launched a credit card programme — entering a market where early delinquency in the first 6–12 months is the most common failure mode for new card issuers. Without card-specific historical data (the cold-start problem), most new issuers rely on generic bureau scores — a weak predictor for card-specific behaviour. CUB has a powerful alternative: years of behavioural data on its own CASA and loan customers.',
      pain:'CUB has recently launched a credit card programme. Without a sophisticated acquisition scoring model, CUB risks either rejecting too many eligible customers (slow portfolio build) or approving too many marginal customers (high early NPA). No card-specific historical data exists to train a model on — the classic cold-start problem.',
      what:'AIDF solves the cold-start problem using CUB\'s existing customer data as proxy: CASA account behaviour (spending patterns, income regularity, overdraft usage), existing loan repayment history (EMI discipline), bureau credit card performance at other banks (existing card payment behaviour), and digital banking engagement (active mobile banking users are lower-risk card customers). As the card portfolio matures, the model transitions to incorporate card-specific signals.',
      dataInputs:[{l:'Finacle CASA and loan data — account behaviour, repayment history',dr:'g'},{l:'Bureau data — existing card performance at other banks, balance, utilisation',dr:'g'},{l:'Digital banking engagement data — mobile banking activity',dr:'g'},{l:'Customer demographic data — CBS master',dr:'g'}],
      outcomes:['Credit card NPA rate below industry average from programme launch','Faster portfolio build — confident approval of right customer segments from day one','Foundation for card-specific behavioural scoring as the portfolio matures'],
      buildsOn:['1.1.1.A — CASA Attrition Predictor'],enables:['1.2.5.B — Card Spend Analytics'],
      rbiNote:null,mockup:null},
     {id:'1.2.5.B',name:'Card Spend Analytics & Customer Intelligence',tier:'Scale-Up',rbi:false,
      cubCtx:'CUB\'s new credit card programme will generate the richest real-time behavioural data available on its customer base — what customers buy, where, how often, at what value. Without analytics infrastructure from day one, this data asset is wasted. Building the analytics layer in parallel with the card programme is the strategic difference between running a card and owning a customer intelligence platform.',
      pain:'CUB\'s card programme will generate rich transaction data — but without analytics infrastructure, this data sits unused. Competitor card issuers use spend analytics to understand customer lifestyle, identify cross-sell timing, detect fraud, and personalise offers.',
      what:'AIDF builds a card spend intelligence layer from the first month: spend category analysis (what are cardholders buying), merchant-level pattern recognition, spend velocity monitoring (unusual acceleration as a fraud or distress signal), and lifestyle segmentation. For CUB specifically, card spend data enriches the broader customer 360 view, giving MSME relationship managers intelligence about their business customers\' personal spending behaviour.',
      dataInputs:[{l:'Card transaction data — real-time feed from card switch',dr:'g'},{l:'Merchant category codes — MCC classification',dr:'g'},{l:'Customer profile data — CBS master',dr:'g'},{l:'Bureau data — cross-product behaviour',dr:'g'}],
      outcomes:['Card engagement improvement — personalised offers based on spend drive 2–3x higher response vs generic marketing','Fraud detection improvement — spend anomaly catches fraud 24–48 hours earlier','Cross-sell conversion — right product, right time, right customer'],
      buildsOn:['1.2.5.A — Card Acquisition Scoring'],enables:['5.5.2.A — Transaction Fraud Intelligence'],
      rbiNote:null,mockup:null}
    ],
    briefUCs:[
     {name:'Credit limit optimisation',desc:'Continuous monitoring of card utilisation, payment behaviour, and income signals to recommend limit increases for good-behaviour customers and limit reductions for deteriorating customers.'},
     {name:'Card delinquency early warning',desc:'Specific early warning model for credit cards — payment due with no payment, minimum payment only (known distress signal), utilisation spike — generating collections contact triggers 10–15 days earlier.'},
     {name:'Reward programme optimisation',desc:'AI analysis of reward redemption patterns to identify reward programme design improvements that increase card engagement without disproportionate cost.'}]}
  ]}
 ]

{id:'D4',num:'4',name:'Treasury & Investments',color:'#4C1D95',
 desc:'ALM (CUB LCR 269% — highest in peer universe), G-Sec portfolio, forex dealing & advisory, money market, market risk, capital adequacy management.',
 depts:6,subdepts:20,ucs:42,

    deepUCs:[{id:'4.1.1.A',name:'Intelligent ALM Dashboard & Liquidity Intelligence',tier:'Scale-Up',rbi:true,
     cubCtx:'CUB\'s LCR of 269% — the highest in its South India private bank peer universe — represents both a regulatory achievement and a significant opportunity cost. The excess liquidity above the regulatory minimum is working at sub-optimal yields. Quantifying exactly how much excess exists, and what redeployment is possible without compromising the buffer, requires daily intelligence — not a monthly ALCO pack.',
     pain:'CUB\'s ALCO meets monthly and reviews an ALM pack prepared manually over 3–4 days. The monthly cadence means significant liquidity or rate environment changes between ALCO meetings are not systematically captured. With CUB\'s LCR at 269%, there is significant opportunity cost from excess liquidity that could be identified and optimised in real-time.',
     what:'AIDF builds a live ALM Intelligence Dashboard updating daily: real-time LCR and NSFR computation, structural liquidity gap analysis updated daily, NII sensitivity under multiple rate scenarios (parallel shift, twist, steepening), deposit maturity profile with behavioural stickiness adjustment (stable core vs volatile portion), and excess liquidity optimisation recommendation. Monthly ALCO pack auto-generated from this live data.',
     dataInputs:[{l:'Finacle — daily deposit and loan position, maturity profile',dr:'g'},{l:'Market data — interest rates, G-Sec yields (Bloomberg/Reuters)',dr:'r'},{l:'Historical deposit behaviour data — stickiness analysis',dr:'g'},{l:'RBI LCR/NSFR parameters — regulatory framework',dr:'g'}],
     outcomes:['ALCO decision quality improvement — decisions based on daily vs month-old data','Excess liquidity identification — even 10% deployment of excess LCR buffer generates meaningful NII improvement','ALCO pack preparation from 3–4 days to same-day','NII sensitivity precision for rate setting decisions'],
     buildsOn:['8.5.1.A — Enterprise Data Quality Intelligence'],enables:[],
     rbiNote:'RBI\'s LCR and NSFR guidelines, IRRBB framework, and ALM return requirements all directly support investment in real-time ALM intelligence.',mockup:null}],
    briefUCs:[

function chartLoanBook(){
  const data=[
    {label:'MSME & Business Banking',pct:44,color:'#2E3192',val:'₹23,349 Cr'},
    {label:'Retail Banking',pct:29,color:'#EC0677',val:'₹15,389 Cr'},
    {label:'Agriculture & Gold Loan',pct:17,color:'#15803D',val:'₹9,021 Cr'},
    {label:'Other',pct:10,color:'#6B7280',val:'₹5,307 Cr'}
  ];
  let cum=0;
  const cx=80,cy=80,r=65,ri=42;
  let paths='';
  data.forEach(d=>{
    const a1=cum*3.6*Math.PI/180,a2=(cum+d.pct)*3.6*Math.PI/180;
    const x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1);
    const x2=cx+r*Math.sin(a2),y2=cy-r*Math.cos(a2);
    const xi1=cx+ri*Math.sin(a1),yi1=cy-ri*Math.cos(a1);
    const xi2=cx+ri*Math.sin(a2),yi2=cy-ri*Math.cos(a2);
    const lg=d.pct>50?1:0;
    paths+=`<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg},0 ${xi1},${yi1}Z" fill="${d.color}" opacity="0.92"/>`;
    cum+=d.pct;
  });
  const legend=data.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
    <div style="width:10px;height:10px;border-radius:2px;background:${d.color};flex-shrink:0"></div>
    <div><div style="font-size:11px;font-weight:600;color:var(--text2)">${d.pct}% — ${d.val}</div>
    <div style="font-size:10px;color:var(--text4)">${d.label}</div></div></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:16px">
    <svg width="160" height="160" viewBox="0 0 160 160">${paths}
      <circle cx="80" cy="80" r="38" fill="white"/>
      <text x="80" y="76" text-anchor="middle" font-size="10" fill="var(--text4)" font-family="DM Sans">Total</text>
      <text x="80" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="var(--cub-blue)" font-family="DM Serif Display">₹53,066 Cr</text>
    </svg>
    <div>${legend}</div>
  </div>`;
}

function chartDivUCs(){
  const data=DIVS.map(d=>({name:d.name.split(' ').slice(0,2).join(' '),ucs:d.ucs,color:d.color}));
  const max=Math.max(...data.map(d=>d.ucs));
  const h=16,gap=6,w=220;
  const rows=data.map((d,i)=>{
    const bw=Math.round((d.ucs/max)*w);
    const y=i*(h+gap);
    return `<g>
      <text x="0" y="${y+12}" font-size="10" fill="var(--text3)" font-family="DM Sans">${d.name}</text>
      <rect x="110" y="${y}" width="${bw}" height="${h}" rx="3" fill="${d.color}" opacity="0.85"/>
      <text x="${110+bw+4}" y="${y+12}" font-size="10" font-weight="600" fill="${d.color}" font-family="DM Sans">${d.ucs}</text>
    </g>`;
  }).join('');
  const svgH=(h+gap)*data.length;
  return `<svg width="100%" height="${svgH}" viewBox="0 0 380 ${svgH}" style="display:block">${rows}</svg>`;
}

function chartDataReadiness(){

  DIVS.forEach(d=>{if(d.departments)d.departments.forEach(dept=>dept.subdepts.forEach(sd=>sd.deepUCs.forEach(uc=>{

function tSD(id,src,dId){
  oSD[id]=!oSD[id];
  if(src==='div'&&cDiv)showDiv(cDiv.id);
  else if(src==='dept'&&dId)showDept(dId);
}
function tUC(id){
  oUC[id]=!oUC[id];
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
}
function tAF(id){
  oAF[id]=!oAF[id];
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
}

// ══════════════════════════════════════════════════════
// SAVE UC
// ══════════════════════════════════════════════════════
function saveUC(sdId){
  const name=document.getElementById(`fn-${sdId}`)?.value?.trim();
  const type=document.getElementById(`ft-${sdId}`)?.value;
  const tier=document.getElementById(`ftr-${sdId}`)?.value;
  const desc=document.getElementById(`fd-${sdId}`)?.value?.trim();
  const ctx=document.getElementById(`fc-${sdId}`)?.value?.trim();
  const di=document.getElementById(`fdi-${sdId}`)?.value?.trim();
  const out=document.getElementById(`fo-${sdId}`)?.value?.trim();
  const rbi=document.getElementById(`fr-${sdId}`)?.value?.trim();
  if(!name){alert('Please enter a use case name.');return;}
  DIVS.forEach(d=>{if(d.departments)d.departments.forEach(dept=>dept.subdepts.forEach(sd=>{
    if(sd.id===sdId){
      if(type==='deep'){
        sd.deepUCs.push({id:`${sdId}.X${sd.deepUCs.length+1}`,name,tier,rbi:!!rbi,cubCtx:ctx||'',pain:desc||'As described.',what:desc||'AIDF enables this capability.',dataInputs:(di||'Finacle CBS').split('·').map(s=>({l:s.trim(),dr:'g'})),outcomes:[out||'As specified.'],buildsOn:[],enables:[],rbiNote:rbi||'',mockup:null});
      }else{sd.briefUCs.push({name,desc:desc||out||'AIDF enables this capability.'});}
      d.ucs++;
    }
  }))});
  oAF[sdId]=false;
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
  rSB();
}

function showGAdd(){
  const m=document.createElement('div');
  m.className='modal-bg';
  m.innerHTML=`<div class="modal-box">
    <div class="modal-title">Add Use Case</div>
    <div class="form-row"><label class="form-label">Division *</label>
      <select class="form-select" id="g-div">${DIVS.map(d=>`<option value="${d.id}">${d.num}. ${d.name}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Department</label>
      <input class="form-input" id="g-dept" placeholder="e.g. Credit Underwriting & Appraisal"></div>
    <div class="form-row"><label class="form-label">Sub-department</label>
      <input class="form-input" id="g-sd" placeholder="e.g. Retail Credit Underwriting"></div>
    <div class="form-row"><label class="form-label">Use case name *</label>
      <input class="form-input" id="g-name" placeholder="e.g. Intelligent credit scoring engine"></div>
    <div class="form-2col">
      <div><label class="form-label">Type</label>
        <select class="form-select" id="g-type"><option value="brief">Brief</option><option value="deep">Deep</option></select></div>
      <div><label class="form-label">Tier</label>
        <select class="form-select" id="g-tier"><option>Quick Win</option><option>Scale-Up</option><option>Transformation</option></select></div>
    </div>
    <div class="form-row"><label class="form-label">Description</label>
      <textarea class="form-textarea" id="g-desc" placeholder="Pain point and what AIDF does..."></textarea></div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveGA()">Save use case</button>
      <button class="btn-cancel" onclick="this.closest('.modal-bg').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
}
function saveGA(){
  const divId=document.getElementById('g-div')?.value;
  const dn=document.getElementById('g-dept')?.value?.trim()||'General';
  const sn=document.getElementById('g-sd')?.value?.trim()||'General';
  const name=document.getElementById('g-name')?.value?.trim();
  const type=document.getElementById('g-type')?.value;
  const tier=document.getElementById('g-tier')?.value;
  const desc=document.getElementById('g-desc')?.value?.trim();
  if(!name){alert('Please enter a use case name.');return;}
  const div=DIVS.find(d=>d.id===divId);
  if(!div.departments)div.departments=[];
  let dept=div.departments.find(d=>d.name===dn);
  if(!dept){dept={id:`${divId}.G${div.departments.length}`,name:dn,subdepts:[]};div.departments.push(dept);div.depts++;}
  let sd=dept.subdepts.find(s=>s.name===sn);
  if(!sd){sd={id:`${dept.id}.G${dept.subdepts.length}`,name:sn,deepUCs:[],briefUCs:[]};dept.subdepts.push(sd);div.subdepts++;}
  if(type==='deep'){sd.deepUCs.push({id:`${sd.id}.X${sd.deepUCs.length+1}`,name,tier,rbi:false,cubCtx:'',pain:desc||'As described.',what:desc||'AIDF enables this.',dataInputs:[{l:'Finacle CBS and relevant data sources',dr:'g'}],outcomes:['As specified.'],buildsOn:[],enables:[],rbiNote:'',mockup:null});}
  else{sd.briefUCs.push({name,desc:desc||'AIDF enables this capability.'});}
  div.ucs++;
  document.querySelector('.modal-bg')?.remove();
  rSB();
  if(view==='div'&&cDiv?.id===divId)showDiv(divId);
  else if(view==='ov')showOv();
}
function pAddD(divId){const n=prompt('Department name:');if(!n)return;const div=DIVS.find(d=>d.id===divId);if(!div.departments)div.departments=[];div.departments.push({id:`${divId}.D${div.departments.length+1}`,name:n,subdepts:[{id:`${divId}.D${div.departments.length+1}.S1`,name:'General',deepUCs:[],briefUCs:[]}]});div.depts++;div.subdepts++;showDiv(divId);}
function pAddSD(dId){const n=prompt('Sub-department name:');if(!n)return;DIVS.forEach(d=>{if(d.departments)d.departments.forEach(dept=>{if(dept.id===dId){dept.subdepts.push({id:`${dId}.S${dept.subdepts.length+1}`,name:n,deepUCs:[],briefUCs:[]});d.subdepts++;}})});if(view==='div'&&cDiv)showDiv(cDiv.id);else if(view==='dept'&&cDept)showDept(cDept.id);}

// INIT
showOv();
</script>
