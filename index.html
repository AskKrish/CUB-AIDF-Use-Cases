<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUB × Centific AIDF — AI Use Case Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* CUB Brand */
  --cub-blue:#2E3192;
  --cub-blue2:#3D42C0;
  --cub-blue-lt:#4F54D4;
  --cub-pink:#EC0677;
  --cub-pink-lt:#F5399B;
  /* UI Palette */
  --bg:#F2F3FB;
  --card:#FFFFFF;
  --card-hover:#FAFBFF;
  --border:#D8DAF0;
  --border-strong:#B8BBE8;
  --text:#0F1035;
  --text2:#2D2F6B;
  --text3:#5C5F99;
  --text4:#8B8EB8;
  --white:#FFFFFF;
  /* Accents */
  --green:#0D7A4B;
  --green-bg:#E8F8F1;
  --amber:#A05C00;
  --amber-bg:#FFF3DC;
  --red:#C0162A;
  --red-bg:#FDEDEF;
  --teal:#0B7A8A;
  --teal-bg:#E5F6F8;
  /* Tier colours */
  --qw-c:#0D7A4B;--qw-bg:#E8F8F1;
  --su-c:#2E3192;--su-bg:#ECEEFF;
  --tr-c:#7B1EA2;--tr-bg:#F5E8FF;
}
body{font-family:'DM Sans',sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ─────── TOP BAR ─────── */
.topbar{background:var(--cub-blue);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(46,49,146,0.3)}
.tb-left{display:flex;align-items:center;gap:14px}
.cub-wordmark{display:flex;align-items:baseline;gap:0}
.cub-wm-cub{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;letter-spacing:-0.02em;font-style:italic}
.cub-wm-sep{width:1px;height:20px;background:rgba(255,255,255,0.3);margin:0 10px;align-self:center}
.tb-aidf{font-size:12px;color:#B0B4E8;font-weight:500;letter-spacing:0.02em}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-pill{font-size:11px;color:#B0B4E8;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}
.btn-add{background:var(--cub-pink);color:#fff;border:none;padding:7px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;box-shadow:0 2px 8px rgba(236,6,119,0.35)}
.btn-add:hover{background:var(--cub-pink-lt);transform:translateY(-1px)}

/* ─────── BREADCRUMB ─────── */
.breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text4)}
.bc-link{cursor:pointer;color:var(--cub-blue);font-weight:500}
.bc-link:hover{text-decoration:underline}
.bc-sep{color:var(--border-strong)}
.bc-cur{color:var(--text);font-weight:600}

/* ─────── LAYOUT ─────── */
.main{display:flex;flex:1;min-height:0}
.sidebar{width:252px;background:var(--white);border-right:1px solid var(--border);padding:10px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;flex-shrink:0}
.content{flex:1;padding:28px;overflow-y:auto}

/* ─────── SIDEBAR ─────── */
.sb-label{font-size:10px;font-weight:700;color:var(--text4);padding:14px 18px 5px;letter-spacing:0.09em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;cursor:pointer;font-size:12.5px;color:var(--text3);border-left:3px solid transparent;transition:all 0.12s;gap:8px}
.sb-item:hover{background:var(--bg);color:var(--text)}
.sb-item.active{background:#ECEEFF;color:var(--cub-blue);border-left-color:var(--cub-blue);font-weight:600}
.sb-name{flex:1;line-height:1.3}
.sb-count{font-size:10px;background:var(--bg);color:var(--text4);padding:2px 7px;border-radius:10px;min-width:26px;text-align:center;flex-shrink:0}
.sb-item.active .sb-count{background:var(--cub-blue);color:#fff}

/* ─────── LANDING HERO ─────── */
.hero{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px;box-shadow:0 4px 24px rgba(46,49,146,0.07)}

.hero-top{background:linear-gradient(135deg,var(--cub-blue) 0%,#1E2270 50%,#252880 100%);padding:32px 36px;display:flex;align-items:flex-start;justify-content:space-between;gap:24px;position:relative;overflow:hidden}
.hero-top::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(236,6,119,0.15),transparent 65%);pointer-events:none}
.hero-top::after{content:'';position:absolute;bottom:-120px;left:30%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(78,84,212,0.2),transparent 65%);pointer-events:none}
.hero-left{flex:1;position:relative;z-index:1}
.hero-eyebrow{font-size:10px;font-weight:700;color:var(--cub-pink);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.hero-eyebrow::before{content:'';width:24px;height:2px;background:var(--cub-pink)}
.hero-title{font-family:'DM Serif Display',serif;font-size:30px;color:#fff;line-height:1.2;margin-bottom:12px}
.hero-title span{color:var(--cub-pink);font-style:italic}
.hero-subtitle{font-size:13px;color:#B0B4E8;line-height:1.7;max-width:500px}
.hero-right{display:flex;flex-direction:column;gap:8px;flex-shrink:0;position:relative;z-index:1;min-width:200px}
.hero-badge{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:10px 14px;transition:all 0.15s}
.hb-title{font-size:10px;font-weight:700;color:var(--cub-pink);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px}
.hb-sub{font-size:12px;color:#D0D4F0}

/* ─────── STATS ROW ─────── */
.stats-6{display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-bottom:1px solid var(--border)}
.stat-cell{padding:18px 20px;border-right:1px solid var(--border);text-align:center}
.stat-cell:last-child{border-right:none}
.stat-num{font-family:'DM Serif Display',serif;font-size:20px;color:var(--cub-blue);font-weight:400;line-height:1}
.stat-label{font-size:10px;color:var(--text4);margin-top:4px;line-height:1.4}
.stat-note{font-size:9px;color:var(--green);font-weight:600;margin-top:2px}
.stat-note.pink{color:var(--cub-pink)}

/* ─────── CHARTS SECTION ─────── */
.charts-section{padding:24px 28px;background:var(--white)}
.charts-title{font-size:13px;font-weight:700;color:var(--cub-blue);margin-bottom:20px;letter-spacing:-0.01em;display:flex;align-items:center;gap:8px}
.charts-title::after{content:'';flex:1;height:1px;background:var(--border)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px}
.charts-grid-2{display:grid;grid-template-columns:1.4fr 1fr;gap:20px}
.chart-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px}
.chart-box-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:14px}

/* ─────── SIGNALS ─────── */
.signals-section{padding:0 28px 24px;background:var(--white);border-bottom-left-radius:16px;border-bottom-right-radius:16px}
.signals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.signal-card{background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--cub-pink);border-radius:10px;padding:14px}
.signal-icon{font-size:20px;margin-bottom:8px}
.signal-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;line-height:1.3}
.signal-desc{font-size:11px;color:var(--text3);line-height:1.55}

/* ─────── TECH BAR ─────── */
.tech-bar{background:linear-gradient(90deg,#ECEEFF,#F0F1FF);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;gap:16px}
.tech-label{font-size:10px;font-weight:700;color:var(--cub-blue);letter-spacing:0.08em;text-transform:uppercase;flex-shrink:0}
.tech-text{font-size:12px;color:var(--text3);line-height:1.5}
.tech-text strong{color:var(--cub-blue)}

/* ─────── SUMMARY STATS ─────── */
.sum-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sum-card{background:var(--white);border:1px solid var(--border);border-top:3px solid var(--cub-blue);border-radius:10px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(46,49,146,0.05)}
.sum-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--cub-blue)}
.sum-label{font-size:11px;color:var(--text4);margin-top:4px}

/* ─────── DIVISION GRID ─────── */
.div-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;margin-bottom:20px}
.div-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--cub-blue);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.15s;position:relative;box-shadow:0 2px 8px rgba(46,49,146,0.04)}
.div-card:hover{box-shadow:0 6px 20px rgba(46,49,146,0.12);transform:translateY(-2px);border-color:var(--cub-blue)}
.div-num-badge{font-size:10px;font-weight:700;color:var(--cub-pink);background:#FDE8F2;padding:3px 9px;border-radius:4px;display:inline-block;margin-bottom:10px;letter-spacing:0.05em}
.div-name{font-family:'DM Serif Display',serif;font-size:16px;color:var(--cub-blue);margin-bottom:7px;padding-right:20px}
.div-desc{font-size:11.5px;color:var(--text3);line-height:1.55;margin-bottom:14px}
.div-stats{display:flex;gap:10px}
.dstat{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:7px 12px;text-align:center}
.dstat-n{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cub-blue)}
.dstat-l{font-size:10px;color:var(--text4);margin-top:1px}
.div-arrow{position:absolute;top:20px;right:16px;font-size:18px;color:var(--border-strong);transition:all 0.15s}
.div-card:hover .div-arrow{color:var(--cub-pink);right:12px}

/* ─────── DEPT HERO ─────── */
.dept-hero{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--cub-blue);border-radius:12px;padding:22px;margin-bottom:20px;box-shadow:0 2px 8px rgba(46,49,146,0.05)}
.dept-hero-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--cub-blue);margin-bottom:5px}
.dept-hero-sub{font-size:13px;color:var(--text3);margin-bottom:14px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600}
.badge-blue{background:#ECEEFF;color:var(--cub-blue)}
.badge-pink{background:#FDE8F2;color:var(--cub-pink)}
.badge-gray{background:var(--bg);color:var(--text4);border:1px solid var(--border)}
.badge-green{background:var(--green-bg);color:var(--green)}

/* ─────── SUBDEPT ─────── */
.subdept-block{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(46,49,146,0.04)}
.subdept-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;background:var(--bg);border-bottom:1px solid var(--border);transition:background 0.12s}
.subdept-head:hover{background:#ECEEFF}
.subdept-head-title{font-size:13.5px;font-weight:600;color:var(--text2)}
.subdept-meta{display:flex;align-items:center;gap:8px}
.sdchev{font-size:11px;color:var(--text4);transition:transform 0.2s}
.sdchev.open{transform:rotate(180deg)}
.subdept-body{padding:18px;display:none}
.subdept-body.open{display:block}

/* ─────── USE CASE CARD ─────── */
.uc-card{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:box-shadow 0.15s;background:var(--white)}
.uc-card:hover{box-shadow:0 3px 12px rgba(46,49,146,0.08)}
.uc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;gap:12px}
.uc-head:hover{background:var(--bg)}
.uc-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.uc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.uc-dot.deep{background:var(--cub-blue)}
.uc-dot.brief{background:var(--cub-pink)}
.uc-name{font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uc-code{font-size:10px;color:var(--text4);font-family:'DM Mono',monospace;margin-top:1px}
.uc-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.tier{font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px}
.tier-qw{background:var(--qw-bg);color:var(--qw-c)}
.tier-su{background:var(--su-bg);color:var(--su-c)}
.tier-tr{background:var(--tr-bg);color:var(--tr-c)}
.rbi-tag{background:#FFF3DC;color:#8B5E00;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.uc-chev{font-size:11px;color:var(--text4)}

/* ─────── UC BODY ─────── */
.uc-body{display:none;border-top:1px solid var(--border)}
.uc-body.open{display:block}
.uc-inner{padding:20px;background:linear-gradient(180deg,#FAFBFF,#F5F6FE)}

/* CUB Context */
.cub-ctx{background:var(--cub-blue);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;gap:12px}
.ctx-icon{font-size:18px;flex-shrink:0}
.ctx-eyebrow{font-size:9px;font-weight:700;color:var(--cub-pink);letter-spacing:0.09em;text-transform:uppercase;margin-bottom:4px}
.ctx-text{font-size:12.5px;color:#D0D4F8;line-height:1.65}

/* 2-col */
.uc-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.uc-sec{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px}
.uc-sec-title{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:9px}
.uc-sec-body{font-size:12.5px;color:var(--text);line-height:1.65}

/* Data readiness */
.di-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;font-size:12px;color:var(--text2)}
.dr{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dr-g{background:#22C55E}.dr-a{background:#F59E0B}.dr-r{background:#EF4444}
.dr-legend{display:flex;gap:12px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.drl{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text4)}

/* Outcomes */
.oc-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:12.5px;color:var(--text)}
.oc-check{color:var(--green);font-size:13px;flex-shrink:0;margin-top:2px;font-weight:700}

/* Dependency */
.dep-wrap{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.dep-title{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px}
.dep-chips{display:flex;gap:8px;flex-wrap:wrap}
.dep-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:500}
.dep-builds{background:var(--amber-bg);color:var(--amber);border:1px solid #FFD580}
.dep-enables{background:var(--teal-bg);color:var(--teal);border:1px solid #99DDE4}
.dep-chip-lbl{font-size:9px;font-weight:700;opacity:0.65;text-transform:uppercase}

/* RBI note */
.rbi-note{background:linear-gradient(135deg,#FFF8E8,#FFF3D0);border-left:3px solid #D97706;border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:14px}
.rbi-note-title{font-size:10px;font-weight:700;color:#8B5E00;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:5px}
.rbi-note-body{font-size:12.5px;color:#6B4800;line-height:1.6}

/* Mockup */
.mockup-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(46,49,146,0.08)}
.mockup-bar{background:var(--cub-blue);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.mockup-bar-title{font-size:11.5px;font-weight:600;color:#fff}
.mockup-illustrative{font-size:9px;font-weight:700;color:#F59E0B;background:rgba(245,158,11,0.15);padding:3px 10px;border-radius:10px;letter-spacing:0.07em;text-transform:uppercase;border:1px solid rgba(245,158,11,0.3)}
.mockup-body{padding:16px}

/* Brief UC */
.brief-uc{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:8px;background:var(--white);border:1px solid var(--border);margin-bottom:8px;transition:all 0.12s}
.brief-uc:hover{border-color:var(--cub-blue);background:var(--bg)}
.brief-dot{width:6px;height:6px;border-radius:50%;background:var(--cub-pink);flex-shrink:0;margin-top:5px}
.brief-name{font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:2px}
.brief-desc{font-size:12px;color:var(--text3);line-height:1.5}

/* Section divider */
.sec-div{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
.sec-div-line{flex:1;height:1px;background:var(--border)}
.sec-div-text{font-size:10px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap}

/* Add buttons */
.add-uc-btn{display:flex;align-items:center;gap:7px;padding:9px 14px;border:1.5px dashed var(--border-strong);border-radius:8px;cursor:pointer;font-size:12px;color:var(--text4);background:transparent;width:100%;transition:all 0.15s;margin-top:10px;font-family:'DM Sans',sans-serif}
.add-uc-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}
.add-sd-btn{display:flex;align-items:center;gap:7px;padding:11px 16px;border:1.5px dashed var(--border-strong);border-radius:10px;cursor:pointer;font-size:13px;color:var(--text4);background:transparent;width:100%;transition:all 0.15s;margin-top:14px;font-family:'DM Sans',sans-serif}
.add-sd-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}
.add-d-btn{display:flex;align-items:center;gap:7px;padding:13px 18px;border:1.5px dashed var(--border-strong);border-radius:12px;cursor:pointer;font-size:13px;color:var(--text4);background:var(--white);width:100%;transition:all 0.15s;margin-bottom:14px;font-family:'DM Sans',sans-serif;box-shadow:0 1px 4px rgba(46,49,146,0.04)}
.add-d-btn:hover{border-color:var(--cub-blue);color:var(--cub-blue);background:#ECEEFF}

/* Add form */
.add-form{background:var(--amber-bg);border:1.5px dashed #D97706;border-radius:10px;padding:18px;margin-top:10px;display:none}
.add-form.open{display:block}
.form-title{font-size:13px;font-weight:700;color:var(--amber);margin-bottom:14px}
.form-row{margin-bottom:11px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:4px;display:block}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 11px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;background:var(--white);font-family:'DM Sans',sans-serif;color:var(--text)}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--cub-blue);box-shadow:0 0 0 3px rgba(46,49,146,0.1)}
.form-textarea{resize:vertical;min-height:80px}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{background:var(--cub-blue);color:#fff;border:none;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save:hover{background:var(--cub-blue2)}
.btn-cancel{background:var(--white);color:var(--text3);border:1px solid var(--border-strong);padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* Dept section in division view */
.dept-sec{margin-bottom:24px}
.dept-sec-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--cub-blue);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dept-sec-link{font-size:12px;font-weight:500;color:var(--cub-pink);cursor:pointer;font-family:'DM Sans',serif}
.dept-sec-link:hover{text-decoration:underline}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,16,53,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.modal-box{background:var(--white);border-radius:14px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(46,49,146,0.25)}
.modal-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--cub-blue);margin-bottom:20px}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}

@media(max-width:900px){
  .sidebar{display:none}
  .stats-6{grid-template-columns:repeat(3,1fr)}
  .charts-grid{grid-template-columns:1fr}
  .charts-grid-2{grid-template-columns:1fr}
  .signals-grid{grid-template-columns:1fr 1fr}
  .uc-2col{grid-template-columns:1fr}
  .sum-stats{grid-template-columns:repeat(2,1fr)}
}

const DIVS=[{id:"D5",num:"5",name:"Credit & Risk",color:"#2E3192",desc:"The bank's core risk intelligence engine. EWS, credit underwriting, NPA management, fraud prevention, AML, and regulatory compliance risk. The deepest AIDF fit across all divisions.",depts:7,subdepts:24,ucs:67,departments:[{id:"D5.1",name:"Credit Policy & Standards",subdepts:[{id:"D5.1.1",name:"Credit Policy Formulation",deepUCs:[{id:"5.1.1.A",name:"Intelligent Policy Calibration Engine",tier:"Scale-Up",rbi:true,cubCtx:"CUB's MSME-heavy portfolio (44% of gross advances) and Tamil Nadu cluster concentration mean sector stress events — Tirupur textile export slowdowns, Salem steel demand drops — directly affect portfolio quality 60-90 days before appearing in NPA data. A static annual policy review cycle is structurally too slow.",pain:"Annual manual policy review using backward-looking data assembled over 3-5 days. By the time new policy takes effect, market conditions have shifted. Sector stress in Tamil Nadu clusters affects the portfolio months before the policy is updated.",what:"AIDF continuously monitors portfolio performance signals — NPA roll rates, sector delinquency trends, bureau score distributions — and generates real-time policy adjustment recommendations. When Tirupur textile exporters show GST turnover compression, AIDF flags policy responses: tighten LTV on cluster collateral, reduce max exposure per borrower, increase bureau score floor. Policy makers receive data-driven recommendations with supporting evidence rather than starting from a blank page.",dataInputs:[{l:"Finacle CBS — NPA, slippage, portfolio composition",dr:"g"},{l:"Bureau data — score distributions by product (all 4 bureaus)",dr:"g"},{l:"EWS trigger log — internal signals database",dr:"g"},{l:"GST API — sector-level turnover and filing data",dr:"a"},{l:"RBI circular feed — regulatory change monitoring",dr:"a"}],outcomes:["30-40% reduction in policy review cycle time","60-90 day earlier detection of sector stress before NPA formation","Reduced policy exceptions as origination standards align with real portfolio risk","Data-backed board presentations directly strengthening RBI inspection responses"],buildsOn:[],enables:["5.3.2.A — Multi-Signal EWS Engine"],rbiNote:"RBI's supervisory expectations on credit risk governance require banks to demonstrate data-driven policy management. AIDF creates an audit trail of policy decisions with supporting analytics — directly useful for RBI Annual Inspection responses.",mockup:null}],briefUCs:[{name:"Negative list auto-refresh",desc:"Monitors court records, MCA filings, GST cancellations, and news feeds to automatically flag entities for CUB's negative borrower list — replacing manual quarterly review."},{name:"Concentration limit early warning",desc:"Real-time monitoring of sector, geography, and group exposure against board-approved limits with automated alerts before breaches occur."},{name:"Regulatory change impact assessment",desc:"When RBI issues a new circular, AIDF identifies all affected CUB business units and generates a compliance action plan with owners and timelines."},{name:"Sector stress index — Tamil Nadu clusters",desc:"Daily composite stress index for Tirupur, Coimbatore, Salem, Thanjavur and Chennai clusters combining GST turnover, commodity prices, news sentiment, and CUB portfolio signals."},{name:"Policy exception tracking intelligence",desc:"AI monitoring of all credit sanction exceptions — tracking frequency, sanctioning authority, and outcome — to identify which exceptions are driving disproportionate NPA formation."},{name:"Interest rate re-pricing optimisation",desc:"AI model recommending optimal re-pricing decisions for floating rate MSME loans at reset dates, balancing NIM improvement against prepayment risk."},{name:"Cross-sell insurance to credit customers",desc:"AI identification of MSME and retail borrowers without credit life or property insurance — enabling compliant, needs-based cross-sell that protects both the customer and CUB's collateral."},{name:"Credit bureau improvement advisory",desc:"AI identification of CUB customers with improvable bureau scores (missed payments on other products, high utilisation) — enabling counselling conversations that improve credit access and reduce CUB's own credit risk."}]},{id:"D5.1.2",name:"Underwriting Standards Management",deepUCs:[{id:"5.1.2.A",name:"Dynamic Underwriting Parameter Optimisation",tier:"Scale-Up",rbi:true,cubCtx:"CUB's 875-branch network spans urban Chennai to rural Cauvery delta — borrower profiles, collateral characteristics, and credit risk vary dramatically. A single static parameter grid applied uniformly systematically misclassifies risk in both directions.",pain:"LTV ratios, bureau cut-offs, income multipliers are set annually and applied uniformly. A salaried Chennai employee with a 780 CIBIL score and a Coimbatore small business owner with 710 but 15 years of CUB relationship pass through the same static grid.",what:"AIDF builds a dynamic underwriting parameter model that adjusts cut-offs based on real-time portfolio performance signals by geography, product, customer segment, and economic cycle. A thin-file MSME borrower in Salem with strong GST turnover and consistent banking behaviour gets a differentiated assessment rather than automatic rejection.",dataInputs:[{l:"Finacle CBS — loan performance, repayment history by geography and product",dr:"g"},{l:"Bureau scores — all 4 bureaus",dr:"g"},{l:"GST API — income surrogate data with AA consent",dr:"a"},{l:"Account statement analysis — 12-24 month banking behaviour",dr:"g"},{l:"Tamil Nadu cluster performance data",dr:"g"}],outcomes:["10-15% approval rate improvement for creditworthy thin-file borrowers","8-12% reduction in early delinquency by tightening parameters for stressed segments","Underwriting consistency across 875 branches"],buildsOn:["5.1.1.A — Policy Calibration Engine"],enables:["5.3.2.A — EWS Engine"],rbiNote:"RBI's guidance on responsible lending supports dynamic, data-driven underwriting over static cut-offs that systematically exclude creditworthy segments.",mockup:null}],briefUCs:[{name:"FOIR computation automation",desc:"AI-assisted income assessment cross-referencing ITR, GST, bank statement, and bureau obligation data — replacing inconsistent branch-level computation."},{name:"Valuation norm compliance monitoring",desc:"Automated check that empanelled valuers' reports comply with CUB's LTV norms and RBI valuation guidelines, flagging outliers before disbursement."},{name:"NTC borrower policy generator",desc:"Segment-specific underwriting guidelines for new-to-credit borrowers using surrogate data — UPI transaction history, utility payments, GST data."},{name:"Bureau score waterfall optimisation",desc:"AI analysis of which bureau (CIBIL, Experian, CRIF, Equifax) provides the most predictive score for each product and geography — optimising bureau pull strategy and cost."},{name:"LGD model calibration",desc:"Loss Given Default estimates calibrated to CUB's actual NPA recovery experience by product, collateral type, geography, and vintage — improving risk-adjusted pricing."}]}]},{id:"D5.3",name:"Portfolio Risk Management",subdepts:[{id:"D5.3.2",name:"Early Warning System (EWS)",deepUCs:[{id:"5.3.2.A",name:"Multi-Signal EWS Engine — Recommended Pilot E1",tier:"Quick Win",rbi:true,cubCtx:"CUB's slippage guidance of Rs.7-8 Bn in FY25 — the lowest since FY13 — is a specific management commitment. The single highest-leverage intervention is detecting stress 60-90 days earlier. With 44% of advances in MSME where stress signals are diffuse, a DPD-only EWS is structurally insufficient.",pain:"Current EWS relies on CBS-generated SMA flags at 30, 60, 90 DPD — reactive by design. Borrower financial stress builds 3-6 months before the flag appears. RMs notice signs anecdotally — borrower avoiding calls, CC utilisation spiking, GST filing lapsing — but no structured mechanism aggregates these signals.",what:"AIDF aggregates 40+ EWS signals across four categories updated daily. Internal: CC/OD utilisation above 90%, cheque returns increasing, inward credits declining. Bureau: enquiry spike, new trade lines, score decline. GST: return filing gaps, turnover declining, ITC drops. External: MCA director resignation, court records, news, sector stress. Output: daily RM dashboard — stress score, top 3 driving signals, recommended action, days to probable SMA.",dataInputs:[{l:"Finacle CBS — daily account data (utilisation, credits, debits, DPD, returns)",dr:"g"},{l:"Bureau data — monthly pull for all active borrowers (all 4 bureaus)",dr:"g"},{l:"GST API (GSTN) — filing status, turnover trend, ITC data",dr:"a"},{l:"MCA21 API — director changes, charge creation, company status",dr:"a"},{l:"eCourt public records API — new cases filed against borrowers",dr:"a"},{l:"News API — negative mentions, sector stress signals",dr:"r"},{l:"CRILC data (RBI) — SMA and NPA at other banks",dr:"g"}],outcomes:["60-90 day advance warning before SMA classification for 65-70% of accounts","20-25% reduction in fresh NPA formation through early management intervention","RM accountability — every RM has a live watchlist","Direct support for CUB management's FY25 slippage guidance of Rs.7-8 Bn"],buildsOn:["8.5.1.A — Enterprise Data Quality Intelligence"],enables:["5.4.2.A — Collections Next-Best-Action Engine","2.6.1.A — RM Intelligent Workbench"],rbiNote:"RBI's SMA framework and CRILC reporting requirements explicitly require robust EWS mechanisms. AIDF's EWS directly fulfils those requirements. This is the recommended AIDF pilot for CUB — core model runs entirely on data already available in Finacle.",mockup:"ews"}],briefUCs:[{name:"EWS false positive management",desc:"AI calibration model learning which signal combinations are genuine stress predictors vs noise — continuously improving signal-to-noise ratio and reducing RM alert fatigue."},{name:"Seasonal EWS adjustment",desc:"For agri and gold loan borrowers, EWS thresholds automatically adjust for seasonal patterns — a gold loan borrower not paying in April during harvest off-season is different from not paying in October."},{name:"Portfolio-level EWS heat map",desc:"Branch management view showing geographic and segment concentration of stressed accounts — enabling proactive resource deployment to high-risk zones."},{name:"EWS → action conversion tracking",desc:"Measures what proportion of EWS alerts resulted in RM action and subsequent cure — closing the loop between early warning and recovery outcome."},{name:"Peer bank CRILC cross-reference",desc:"Daily CRILC data cross-reference identifying CUB borrowers who are SMA/NPA at other banks before they show stress at CUB — the most powerful early warning signal available."}]},{id:"D5.3.1",name:"Portfolio Monitoring & MIS",deepUCs:[{id:"5.3.1.A",name:"Intelligent Portfolio Health Dashboard",tier:"Quick Win",rbi:true,cubCtx:"CUB's gross slippage ratio has declined from 5.9% in December 2019 to approximately 2.1% in FY24. Sustaining this trajectory requires moving from monthly backward-looking review to real-time forward-looking intelligence. The difference between detecting stress in month-end data vs daily data is 20-30 days of intervention runway.",pain:"Portfolio MIS is assembled monthly from Finacle data extracts, processed through Excel, compiled into reports taking 3-5 days. By the time Board or ALCO receives the portfolio health report, the data is already 30+ days old.",what:"AIDF connects directly to Finacle and builds a real-time portfolio intelligence layer: live NPA and SMA position updated daily, roll rate analysis by product and geography, vintage curves for every disbursement cohort, segment heat maps, and an AI-generated narrative summary in plain English for board presentation.",dataInputs:[{l:"Finacle CBS — daily loan account data (DPD, outstanding, product, geography)",dr:"g"},{l:"Bureau data — monthly enrichment for risk scoring",dr:"g"},{l:"EWS trigger log — from EWS Engine",dr:"g"},{l:"Collections outcome data — resolution rates, cure rates",dr:"g"}],outcomes:["Portfolio reporting from 30-day lag to near real-time","Board and ALCO presentations auto-generated — 3-5 day effort reduced to hours","Early identification of deteriorating segments 45-60 days earlier"],buildsOn:["8.5.1.A — Data Quality Intelligence"],enables:["5.3.3.A — Credit Stress Testing"],rbiNote:"RBI's supervisory expectations on portfolio risk monitoring and the requirement to demonstrate proactive identification of stress directly support investment in real-time portfolio intelligence.",mockup:null}],briefUCs:[{name:"Automated RAROC computation",desc:"Risk-adjusted return on capital computed at segment, product, and relationship level — enabling CUB to identify which parts of the business are genuinely profitable after risk cost adjustment."},{name:"Peer benchmarking intelligence",desc:"AIDF automatically ingests peer bank disclosures (Karur Vysya Bank, South Indian Bank, Tamilnad Mercantile Bank) and benchmarks CUB's key portfolio metrics every quarter."},{name:"Portfolio concentration alert",desc:"Real-time monitoring of sector, geography, and group exposure concentration with automated escalation when approaching board-approved limits."},{name:"Vintage curve analysis automation",desc:"Automated generation of vintage curves for every loan disbursement cohort by product, geography, and origination channel — enabling early identification of cohorts with abnormal delinquency trajectories."},{name:"NPA ageing and resolution tracking",desc:"Real-time dashboard tracking all NPA accounts by age, resolution stage (legal, OTS, settled), and expected recovery timeline — replacing manual NPA registers."},{name:"Credit stress testing engine",desc:"AIDF runs portfolio stress tests against defined macro scenarios (interest rate shock, commodity price crash, sector downturn) and outputs impacted NPA position and capital requirement."}]},{id:"D5.3.3",name:"Credit Stress Testing",deepUCs:[],briefUCs:[{name:"Macro scenario stress test automation",desc:"Automated quarterly stress tests using RBI-defined scenarios — generating capital adequacy impact and board-ready output without manual model runs."},{name:"Reverse stress testing",desc:"AIDF identifies the scenario under which CUB's capital ratio would breach regulatory minimum — enabling management to understand and monitor the specific vulnerabilities."},{name:"Climate risk scenario analysis",desc:"Incorporating RBI's emerging climate risk guidance — quantifying exposure to flood-prone districts, drought-vulnerable agri clusters, and carbon-intensive industries in CUB's portfolio."}]}]},{id:"D5.4",name:"NPA Management & Recovery",subdepts:[{id:"D5.4.2",name:"Collections Strategy & Management",deepUCs:[{id:"5.4.2.A",name:"Collections Next-Best-Action Engine",tier:"Scale-Up",rbi:true,cubCtx:"CUB's Provision Coverage Ratio at 78% reflects a well-provisioned NPA book — but the most valuable intervention is preventing NPA formation. With a collections team covering 875 branches and a predominantly MSME and agri borrower base, the efficiency gap between uniform bucket-based collections and intelligent targeted collections is significant.",pain:"Collections strategy is bucket-based and uniform — SMA-0 gets a tele-call, SMA-1 gets a field visit, SMA-2 gets a legal notice. This ignores what the data already knows: payment history patterns, best contact channel, propensity to cure. High-propensity accounts get the same intensity as high-risk accounts, wasting resources.",what:"For every account in the collections pipeline, AIDF computes three scores daily: Cure propensity (probability of self-cure without intervention in 30 days), Contact responsiveness (which channel and time of day has highest response probability for this specific borrower), and Escalation urgency (how quickly this account will roll to a worse bucket if not contacted). Output: daily Next Best Action for each collections officer.",dataInputs:[{l:"Finacle CBS — DPD, payment history, account behaviour",dr:"g"},{l:"Collections contact log — call outcomes, field visit notes, PTP history",dr:"g"},{l:"Bureau data — credit behaviour at other lenders",dr:"g"},{l:"Customer contact data — verified phone, address",dr:"g"},{l:"Time-of-day response data — historical contact success patterns",dr:"g"}],outcomes:["15-20% improvement in SMA resolution rate before NPA classification","25-30% improvement in collections staff productivity","Reduction in field visit cost — high-cure accounts handled digitally"],buildsOn:["5.3.2.A — Multi-Signal EWS Engine"],enables:["5.4.3.A — Legal Recovery Intelligence"],rbiNote:"RBI Fair Practices Code for collections compliance is built into the action engine — contact hour restrictions, channel appropriateness, and harassment prevention are hard-coded constraints.",mockup:null}],briefUCs:[{name:"Skip tracing intelligence",desc:"AI aggregates digital footprints to locate borrowers who have gone unreachable — reducing time field agents spend on fruitless visits to wrong addresses."},{name:"Collections agency performance optimisation",desc:"AIDF tracks collection agency performance by account type, geography, and bucket and recommends optimal account allocation based on demonstrated strengths."},{name:"Promise-to-pay reliability scoring",desc:"Not all PTPs are equal. AIDF scores the reliability of each promise-to-pay based on borrower PTP history, account behaviour, and external signals."},{name:"Field visit route optimisation",desc:"AI-optimised daily field visit routes for collections officers — prioritising accounts by risk and cure probability while minimising travel time across geographies."},{name:"Settlement amount optimisation",desc:"For accounts being considered for negotiated settlement, AIDF models the optimal settlement range based on account vintage, collateral value, legal stage, and historical settlement outcomes."}]},{id:"D5.4.3",name:"Legal Recovery & SARFAESI",deepUCs:[],briefUCs:[{name:"SARFAESI process compliance monitor",desc:"Step-by-step tracking of all active SARFAESI proceedings — every legally mandated step, timeline, and documentation — with alerts when timelines approach to prevent procedural failures."},{name:"DRT case management intelligence",desc:"Real-time tracking of all DRT cases with next action, hearing date, responsible advocate, and deadline — eliminating missed court dates through automated reminders."},{name:"NPA auction optimisation",desc:"AI analysis of property auction market conditions, historical bid-to-reserve ratios, and timing recommendations to maximise recovery value in SARFAESI auctions."},{name:"OTS pricing intelligence",desc:"For accounts being considered for one-time settlement, AIDF models the optimal settlement range based on account vintage, collateral value, legal stage, and historical settlement outcomes."},{name:"Recovery probability scoring",desc:"AI model predicting probability of recovery, expected timeline, and estimated recovery amount for each NPA account — enabling rational resource allocation across the recovery portfolio."}]}]},{id:"D5.5",name:"Fraud Risk Management",subdepts:[{id:"D5.5.1",name:"Fraud Prevention — Origination",deepUCs:[{id:"5.5.1.A",name:"Origination Fraud Detection Engine",tier:"Scale-Up",rbi:true,cubCtx:"CUB's DSA-driven home loan and MSME credit growth introduces third-party origination risk. DSA channel, empanelled valuers, and external legal counsel create a coordination structure that, if compromised, can result in coordinated fraud that passes every individual control while failing systemically.",pain:"Fraud at loan origination — fake income documents, inflated property valuations, identity theft, borrower-valuator collusion — is the largest source of unrecoverable NPA loss. Current prevention relies on field investigation reports (3-5 days, often superficial) and bureau checks (detect only known fraud).",what:"AIDF builds multi-layer origination fraud scoring: Document intelligence (OCR analysis detecting cross-document mismatches), Network fraud detection (mapping relationships between borrowers, DSAs, valuers — detecting unusual clustering patterns), Identity verification (cross-referencing against Aadhaar, PAN, EPFO, MCA), and Behavioural fraud signals (rushed documentation, unusual communication patterns).",dataInputs:[{l:"Application documents via LOS — PDF, scanned uploads",dr:"g"},{l:"Aadhaar eKYC — UIDAI API",dr:"a"},{l:"PAN verification — NSDL/UTI API",dr:"a"},{l:"EPFO data — employee count and establishment verification",dr:"a"},{l:"MCA21 API — director database, company status",dr:"a"},{l:"CIBIL FRAUD database — known fraud patterns",dr:"g"},{l:"DSA and valuer performance data — internal tracking",dr:"g"}],outcomes:["40-50% improvement in origination fraud detection rate","Near-elimination of network fraud through relationship mapping","Reduction in fraud-at-origination NPA losses"],buildsOn:[],enables:["5.5.2.A — Transaction Fraud Detection"],rbiNote:"RBI requires reporting of all frauds above Rs.1 Lakh to FMR. AIDF's detection capability directly strengthens CUB's fraud risk management framework.",mockup:null}],briefUCs:[{name:"DSA quality scoring",desc:"Continuous scoring of each DSA's portfolio quality — NPA rate, fraud rate, documentation quality — enabling proactive de-empanelment of high-risk DSAs before losses accumulate."},{name:"Synthetic identity detection",desc:"AI model targeting synthetic identities — fabricated individuals increasingly common in personal loan fraud — by cross-referencing signals a real person would have but a synthetic identity lacks."},{name:"Valuer collusion detection",desc:"Pattern analysis identifying valuers who consistently over-value properties that subsequently show poor realisation in NPA auctions — enabling proactive panel management."},{name:"Internal fraud monitoring",desc:"AI monitoring of Finacle CBS transactions and user activity for patterns associated with insider fraud — unusual overrides, cash transaction patterns, account modifications outside normal hours."},{name:"Gold loan fraud detection",desc:"Specific fraud model for CUB's gold loan business — detecting fake gold, multi-pledge of the same ornaments across branches, and appraiser collusion."}]}]},{id:"D5.6",name:"Compliance Risk & Regulatory",subdepts:[{id:"D5.6.2",name:"AML & KYC Compliance",deepUCs:[{id:"5.6.2.A",name:"AML Transaction Monitoring Optimisation",tier:"Scale-Up",rbi:true,cubCtx:"CUB's retail and MSME customer base in Tamil Nadu — with its large cash-intensive small business economy, significant gold loan activity, and substantial NRI remittance flows — generates a complex AML monitoring environment. Rule-based systems calibrated for generic banking profiles systematically over-alert on legitimate Tamil Nadu business patterns.",pain:"CUB's AML transaction monitoring generates thousands of alerts monthly — the vast majority false positives. AML compliance officers spend 80-90% of their time clearing false positives rather than investigating genuine suspicious transactions.",what:"AIDF builds a second-generation AML intelligence layer: Alert scoring (every rule-based alert scored for genuine suspicious transaction probability based on full customer context), Network analysis (mapping fund flows across accounts to detect coordinated laundering below individual thresholds), and Self-learning calibration (AIDF learns from investigator decisions to improve future alert scoring).",dataInputs:[{l:"All Finacle transaction data — real-time feed",dr:"g"},{l:"Existing AML system alerts and investigation outcomes",dr:"g"},{l:"Customer KYC and risk classification data",dr:"g"},{l:"UPI and payment system transaction data — NPCI",dr:"g"},{l:"Finacle account relationship data — customer linkages",dr:"g"}],outcomes:["False positive rate reduction of 50-60% — investigator productivity doubles","Detection quality improvement — genuine suspicious transactions identified with higher confidence","STR quality improvement — AIDF-supported STRs contain richer evidence"],buildsOn:["8.5.1.A — Enterprise Data Quality Intelligence"],enables:[],rbiNote:"RBI's AML guidelines, PMLA obligations, and FIU-IND engagement with banks on STR quality directly support investment in intelligent AML monitoring. ML-enhanced AML is a regulatory expectation for banks of CUB's sophistication.",mockup:null}],briefUCs:[{name:"RBI circular impact analyser",desc:"When RBI issues a new circular, AIDF immediately identifies all affected CUB business units and generates a compliance action plan with owners and timelines."},{name:"PEP and sanctions screening enhancement",desc:"Real-time screening with fuzzy name matching and transliteration handling — addressing the weakness of exact-match screening in multilingual Tamil Nadu contexts."},{name:"DPDP Act compliance monitoring",desc:"Continuous monitoring of CUB's data processing activities against India's Digital Personal Data Protection Act 2023 — consent management, data minimisation, purpose limitation."},{name:"STR quality scoring",desc:"AI assessment of STR draft quality before filing to FIU-IND — ensuring completeness, accuracy, and adequacy of the suspicious transaction narrative."},{name:"KYC periodic review automation",desc:"AI-prioritised periodic KYC review queue — identifying customers with highest risk of changed risk profile (new negative news, changed business activity, geographic movement) for priority re-KYC."},{name:"Beneficial ownership mapping",desc:"AI-assisted mapping of beneficial ownership for MSME and corporate borrowers — detecting complex ownership structures that obscure the ultimate beneficial owner."}]},{id:"D5.6.3",name:"RBI Regulatory Compliance",deepUCs:[],briefUCs:[{name:"CRAR monitoring and optimisation",desc:"Real-time capital adequacy ratio tracking with scenario analysis showing the capital impact of new lending decisions before they are sanctioned — enabling capital-aware credit decisions."},{name:"SLR and CRR compliance monitoring",desc:"Automated daily monitoring of SLR and CRR positions against RBI requirements with alert on any shortfall risk before the reporting date."},{name:"IRMD policy compliance checker",desc:"AI checking of every credit sanction against the latest IRMD credit policy parameters — flagging deviations before sanction letters are issued."},{name:"RBI inspection preparation intelligence",desc:"Before every RBI Annual Inspection, AIDF generates a comprehensive self-assessment report identifying all areas of potential adverse findings with remediation status."}]}]},{id:"D5.7",name:"Operational Risk Management",subdepts:[{id:"D5.7.1",name:"Operational Risk Framework",deepUCs:[],briefUCs:[{name:"RCSA automation",desc:"AI-assisted Risk and Control Self Assessment pre-populating risk registers based on process maps and historical loss data — reducing annual RCSA exercise from months to weeks."},{name:"KRI anomaly detection",desc:"Automated monitoring of Key Risk Indicators with AI anomaly detection — identifying KRI combinations that historically precede loss events."},{name:"Third-party risk continuous monitoring",desc:"AI monitoring of critical vendors (Infosys Finacle, payment processors, network providers) using news sentiment, financial health signals, and service performance data."},{name:"Reconciliation break auto-resolution",desc:"AI matching engine for inter-branch, nostro, and payment system reconciliation breaks — automatically matching and proposing resolution for routine breaks."},{name:"Operational loss event analysis",desc:"AI pattern analysis of operational loss events to identify root causes, systemic control weaknesses, and correlations with specific branches, processes, or staff profiles."}]},{id:"D5.7.2",name:"Cyber & Technology Risk",deepUCs:[],briefUCs:[{name:"Cyber risk appetite monitoring",desc:"Real-time dashboard tracking CUB's cyber risk posture against board-approved risk appetite — patch compliance, vulnerability backlog, incident frequency, third-party exposure."},{name:"Business continuity intelligence",desc:"AI monitoring of business continuity metrics across all critical systems — Finacle availability, payment system uptime, DR readiness — with predictive alerts before outages."},{name:"Technology risk trend analysis",desc:"Quarterly AI analysis of technology risk trends across the banking industry — translating external threat intelligence into CUB-specific risk implications."}]}]}]},{id:"D2",num:"2",name:"MSME & Business Banking",color:"#1D4ED8",desc:"CUB's single largest segment at 44% of gross advances. GST-based credit scoring, Tamil Nadu cluster intelligence, co-lending (target: 12-15% of book), digital MSME lending (CEO's 48-hour TAT commitment), RM intelligent workbench.",depts:7,subdepts:21,ucs:58,departments:[{id:"D2.1",name:"MSME Lending — Secured",subdepts:[{id:"D2.1.1",name:"Micro Enterprise Lending",deepUCs:[{id:"2.1.1.A",name:"GST-Powered Micro Enterprise Credit Scoring",tier:"Quick Win",rbi:true,cubCtx:"Tamil Nadu's micro enterprise economy — textile traders in Salem, steel fabricators in Coimbatore, agro-processors in Thanjavur — is predominantly GST-registered but not meaningfully served by traditional bureau-based credit assessment. CUB's geographic concentration in exactly these clusters makes GST-based scoring a structural competitive advantage.",pain:"Micro enterprise borrowers are chronically underserved because their financial documentation is thin. A textile trader in Salem with Rs.2 Cr annual turnover may file ITR but declared income bears no relationship to actual cash flows. CUB's underwriting over-relies on collateral.",what:"AIDF builds a micro enterprise credit score using GST returns as the primary income signal. GSTR-1 (outward supplies) and GSTR-3B (net tax liability — margin proxy) provide a 24-month revenue and margin history. Cross-referenced with account statement analysis, rservice (utilisation declining, bureau score improving, new capital investment signals) that CUB could offer better terms to."},{name:"Group exposure consolidation",desc:"AI mapping of related entity networks across CUB's SME portfolio — ensuring group exposure is correctly consolidated and within policy limits even when individual entities appear within limits."},{name:"SME digital banking adoption scoring",desc:"Scoring SME customers on digital banking adoption and recommending targeted interventions to increase usage — improving stickiness and generating transaction data for credit scoring."}]}]},{id:"D2.2",name:"MSME Lending — Unsecured & Scheme",subdepts:[{id:"D2.2.1",name:"Unsecured MSME — Digital Lending",deepUCs:[],briefUCs:[{name:"48-hour TAT digital MSME lending monitor",desc:"End-to-end TAT dashboard tracking every digital MSME loan application against CUB CEO's public 48-hour commitment — identifying bottlenecks in real time."},{name:"Account Aggregator integration intelligence",desc:"AI using AA-consented data (bank statements, GST, ITR) to replace manual document collection for MSME underwriting — the foundational capability for sub-48-hour TAT."},{name:"MSME digital loan product optimisation",desc:"AI analysis of product acceptance, NPA performance, and competitive positioning of CUB's digital MSME loan products — recommending product feature adjustments."},{name:"MSME creditline auto-renewal",desc:"For borrowers with clean 12-month history, AIDF automatically prepares the renewal package and initiates the approval workflow — renewals completed before the borrower even knows the limit is expiring."},{name:"Thin-file MSME scoring",desc:"AI scoring model for first-time borrowers with no credit history using UPI transaction data, utility payment regularity, and business registration vintage as surrogate creditworthiness indicators."},{name:"Mudra loan targeting",desc:"AI identification of MSME customers eligible and likely to benefit from MUDRA loan products — Shishu, Kishore, Tarun tiers — with tailored outreach based on business stage and funding need."}]},{id:"D2.2.4",name:"Co-Lending Programme Management",deepUCs:[{id:"2.2.4.A",name:"Co-Lending Partner & Portfolio Intelligence",tier:"Scale-Up",rbi:true,cubCtx:"CUB's MD has publicly stated the bank is actively exploring co-lending — with a target of 12-15% of overall loan book over 4-5 years. RBI Co-Lending Arrangements Directions 2025 (effective January 2026) have materially tightened the compliance framework at exactly this moment of ambition.",pain:"CUB is actively building its co-lending programme. Managing NBFC due diligence, portfolio quality monitoring, RBI CLA 2025 compliance, and escrow management will become operationally overwhelming as the book scales.",what:"AIDF builds a Co-Lending Programme Intelligence layer: NBFC partner scoring (financial health, portfolio quality, regulatory compliance — updated quarterly), co-lent portfolio monitoring (NPA rate, collection efficiency, and early warning signals), and RBI CLA 2025 compliance monitoring (minimum 10% retention verification, irrevocable commitment tracking, blended interest rate computation, escrow waterfall reconciliation).",dataInputs:[{l:"NBFC partner financial statements — quarterly",dr:"a"},{l:"RBI NBFC regulatory data — public disclosures",dr:"a"},{l:"Co-lent loan portfolio data — from Finacle",dr:"g"},{l:"Escrow account data — co-lending settlement accounts",dr:"g"},{l:"News and rating data — NBFC partner monitoring",dr:"r"},{l:"CRILC — NBFC partner NPA reporting",dr:"g"}],outcomes:["Early detection of NBFC partner stress — 60-90 days before it affects portfolio quality","Automated RBI CLA 2025 compliance monitoring — reducing regulatory risk","Co-lending book growth confidence toward the 12-15% target"],buildsOn:["5.3.2.A — Multi-Signal EWS Engine"],enables:[],rbiNote:"RBI's Co-Lending Arrangements Directions 2025 (effective January 2026) impose specific compliance requirements. CUB is managing this compliance right now. AIDF as a compliance assurance tool is immediately relevant.",mockup:null}],briefUCs:[{name:"CGTMSE claim prediction",desc:"AI model predicting which CGTMSE-covered loans are most likely to result in claims — enabling CUB to manage guarantee utilisation proactively and improve claim success rate."},{name:"Government scheme eligibility matcher",desc:"For every MSME loan application, AIDF automatically identifies all applicable government schemes (MUDRA, CGTMSE, SVANidhi, Stand-Up India) and the optimal scheme combination."},{name:"Co-lending NBFC sourcing intelligence",desc:"AI screening of potential new co-lending NBFC partners — portfolio quality, geographic fit with CUB's network, product complementarity, and RBI standing."},{name:"Escrow reconciliation automation",desc:"Automated daily reconciliation of co-lending escrow accounts across all NBFC partners — eliminating the manual reconciliation effort as the co-lending book scales."},{name:"Blended interest rate compliance tracking",desc:"Real-time monitoring that the blended interest rate across CUB and NBFC co-lending components complies with the RBI-mandated formula for every active co-lending account."}]}]},{id:"D2.3",name:"Trade Finance — MSME",subdepts:[{id:"D2.3.1",name:"Trade Finance Operations",deepUCs:[],briefUCs:[{name:"LC issuance risk intelligence",desc:"AI risk assessment for Letter of Credit issuance to MSME customers — validating underlying trade, counterparty risk, and commodity price exposure before issuance."},{name:"Export finance disbursement optimisation",desc:"AI-assisted disbursement scheduling for export finance facilities — aligning with shipping schedules, realisation timelines, and forex hedging positions."},{name:"Import LC fraud detection",desc:"Pattern analysis of import LC applications identifying red flags — over-invoicing, related party transactions, goods inconsistent with declared business — before issuance."},{name:"Trade finance limit utilisation analytics",desc:"Analysis of seasonal utilisation patterns for trade finance limits — recommending limit adjustments that align with business cycles rather than static annual reviews."},{name:"Cross-border transaction monitoring",desc:"AI monitoring of cross-border MSME transactions for FEMA compliance — flagging transactions that require AD bank reporting or are inconsistent with declared business activity."}]}]},{id:"D2.6",name:"MSME Relationship Management",subdepts:[{id:"D2.6.1",name:"Relationship Manager Operations",deepUCs:[{id:"2.6.1.A",name:"RM Intelligent Workbench",tier:"Scale-Up",rbi:false,cubCtx:"CUB is actively investing in its MSME relationship management capability — a new sales vertical focused on secured retail and MSME segments has been set up. The quality of RM-customer engagement across 875 branches will be the primary determinant of whether this investment converts into loan book quality and growth.",pain:"CUB's MSME RMs manage portfolios of 50-100 borrowers each. Current tools are CBS query screens and manual spreadsheets. Each morning, an RM has no structured view of which accounts need attention, which need renewal, which cross-sell opportunities are ready, and which accounts show early stress.",what:"AIDF builds an RM Intelligent Workbench — a daily prioritised action list: Top 5 accounts requiring immediate attention (EWS score above threshold), renewals due in next 30 days (with auto-prepared renewal data), cross-sell opportunities (product gaps and propensity scores), new disbursement follow-up, and customer relationship moments. Every action item is pre-loaded with relevant data. For the most important alerts, AIDF pre-drafts the call script.",dataInputs:[{l:"Finacle portfolio data — all active accounts for each RM",dr:"g"},{l:"EWS scores — from EWS Engine",dr:"g"},{l:"Product holding database — current product penetration per customer",dr:"g"},{l:"Renewal calendar — upcoming limit renewals",dr:"g"},{l:"Cross-sell propensity model —
