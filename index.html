onitoring across Rs.14,330 Cr book — capability CUB currently cannot achieve manually","Gold price event response time reduced from days to hours across 875 branches","Regulatory LTV breach elimination","Portfolio-level gold price sensitivity quantification for treasury and ALCO"],buildsOn:[],enables:["3.1.4.A — Auction Optimisation Engine"],rbiNote:"RBI's 2024 Master Direction on Gold Loans includes specific requirements for LTV monitoring and breach management. CUB's scale makes systematic real-time LTV monitoring a primary supervisory expectation.",mockup:"gold"}],briefUCs:[{name:"Bullet loan maturity management",desc:"Automated tracking of bullet repayment gold loans approaching maturity with customer contact triggers 30, 15, and 7 days before due date — reducing auction rates by improving proactive renewal conversations."},{name:"Portfolio concentration analytics",desc:"Branch-wise, scheme-wise, and ticket-size-wise gold loan concentration monitoring with alerts when any dimension approaches risk policy limits."},{name:"Gold loan customer lifetime value",desc:"AI model estimating the lifetime value of each gold loan customer based on loan cycle frequency, loyalty, and cross-product holding — enabling relationship investment decisions."},{name:"Gold loan scheme optimisation",desc:"AI recommendation of the optimal gold loan scheme for each borrower (bullet, monthly interest, EMI, OD) based on income type, cash flow pattern, and crop cycle timing."},{name:"Seasonal demand forecasting for gold loans",desc:"AIDF predicts gold loan demand by branch for next 30-60 days based on crop calendar, festival season, gold price trends — enabling proactive liquidity and staffing planning."},{name:"Gold loan NPA auction management",desc:"AI analysis of optimal auction timing, reserve price setting, and buyer outreach strategy for gold NPA auctions — maximising recovery value across CUB's gold NPA book."},{name:"Gold loan product innovation intelligence",desc:"AI analysis of gold loan product features at peer banks — Muthoot, Manappuram, HDFC, ICICI — identifying product innovations CUB could adopt for its gold loan book."},{name:"Gold price volatility alert for ALCO",desc:"AI-generated gold price scenario analysis for ALCO — quantifying the P&L and capital impact of a 15%, 25%, and 35% gold price decline on CUB's Rs.14,330 Cr book."},{name:"Agri borrower phone-based outreach intelligence",desc:"For CUB's rural agri borrowers with limited digital access, AI-optimised IVR and SMS outreach sequences in Tamil — improving contact rates for renewal, KYC, and collection communications."},{name:"Crop loan waiver scheme tracking",desc:"AI monitoring of Tamil Nadu state government crop loan waiver announcements and eligibility criteria — enabling CUB to proactively assess waiver impact on its KCC portfolio and initiate claims."},{name:"Rural branch digital activation intelligence",desc:"AI identification of rural branch customers ready for digital banking activation — enabling targeted digital onboarding that expands CUB's digital reach without requiring customers to travel to urban branches."},{name:"Gold loan competitor intelligence",desc:"AI monitoring of gold loan interest rates, LTV ratios, and processing fees at competing institutions — enabling CUB to maintain competitive positioning in its most important product segment."},{name:"NABARD refinance optimisation",desc:"AI analysis of CUB's agricultural loan portfolio to identify the maximum NABARD refinance eligible quantum and optimal tranche structure — reducing CUB's funding cost on agri loans."},{name:"Micro irrigation loan intelligence",desc:"AI targeting of farmers in water-stressed Tamil Nadu districts for micro-irrigation loan products (drip, sprinkler) — an underserved need with strong government subsidy support."},{name:"FPO (Farmer Producer Organisation) lending intelligence",desc:"AI screening and monitoring of FPO entities for group credit facilities — an emerging priority sector product with RBI incentives for banks that lend to FPOs."},{name:"Rural household financial inclusion score",desc:"AI scoring of CUB's rural household customers on financial inclusion depth — identifying households with savings accounts but no credit, insurance, or investment products for targeted product expansion."},{name:"Agricultural commodity price integration",desc:"AI integration of Tamil Nadu Agricultural Produce Marketing Committee (APMC) prices for paddy, sugarcane, cotton, and groundnut into CUB's agri credit risk assessment."},{name:"Drought-resistant crop advisory integration",desc:"AI linking of TNAU drought-resistant crop variety recommendations to CUB's crop loan products — enabling RMs to advise farmers on risk-reducing crop choices aligned with CUB's credit risk interests."},{name:"Kisan Credit Card digital renewal",desc:"AI-powered fully digital KCC renewal workflow — GST-free income assessment using land records, satellite data, and repayment history — enabling renewal in 24 hours without branch visit."},{name:"Rural gold accumulation programme",desc:"AI identification of rural customers with regular savings patterns who could benefit from a gold accumulation scheme — supporting both customer wealth building and CUB's gold loan pipeline."},{name:"Agri equipment loan propensity",desc:"AI identification of farmers approaching equipment replacement cycles (tractors, tillers, harvesters) based on purchase vintage and usage signals — enabling proactive agri equipment loan campaigns."},{name:"SHG digital banking transition intelligence",desc:"AI identification of SHG groups ready for individual banking product transition — savings accounts, individual credit, and insurance — enabling CUB to graduate SHG members to the retail banking relationship."},{name:"Water table monitoring integration",desc:"AI integration of groundwater level data from Tamil Nadu government — identifying agricultural zones where declining water table increases crop loan risk beyond what satellite NDVI captures."},{name:"Post-harvest finance intelligence",desc:"AI identification of paddy and other crop loan borrowers in the post-harvest period who could benefit from warehouse receipt financing — enabling them to delay distress selling while CUB holds the pledge."},{name:"Tamil Nadu government scheme integration",desc:"AI tracking of all Tamil Nadu state government agricultural schemes — subsidy programmes, insurance schemes, irrigation grants — generating alerts for CUB farmers on applicable schemes before application deadlines."},{name:"Rural insurance penetration intelligence",desc:"AI analysis of CUB's rural customer base insurance penetration (crop, life, health) against available products — identifying the highest-impact insurance cross-sell opportunities by geography and customer segment."}]},{id:"D3.1.1",name:"Gold Loan Origination & Appraisal",deepUCs:[{id:"3.1.1.A",name:"AI-Assisted Gold Purity & LTV Verification",tier:"Quick Win",rbi:true,cubCtx:"CUB's gold loan book of Rs.14,330 Cr spread across 875 branches means appraiser quality is the single most important control. Even a 0.5% fake gold rate across this book represents Rs.70+ Cr of exposure to complete loss at NPA.",pain:"Gold loan appraisal at 875 branches relies entirely on the branch appraiser's physical assessment. Appraiser skill varies significantly. Fake gold — gold-plated copper or bronze ornaments — passes through inconsistent appraisal and is typically detected only at auction when the NPA gold turns out to be near-worthless.",what:"AIDF builds a Gold Loan Appraisal Intelligence layer: Appraiser quality monitoring — tracks each appraiser's historical accuracy comparing appraised value at origination against realised value at auction for NPA accounts, flagging appraisers whose systematic over-valuation requires retraining. Anomaly detection — identifies packets where appraised value is statistically inconsistent with declared ornament description, weight, purity, customer profile, and branch appraisal patterns.",dataInputs:[{l:"Finacle gold loan data — packet details, appraised value, appraiser ID, branch",dr:"g"},{l:"Auction realisation data — NPA accounts: actual gold value vs appraised",dr:"g"},{l:"Live gold price data — MCX spot price for benchmarking",dr:"r"},{l:"Branch appraisal history — historical accuracy by appraiser",dr:"g"}],outcomes:["Fake gold detection improvement — estimated 3-5x better than current manual process","Appraiser quality management — data-driven training and supervision","Reduction in NPA gold revaluation losses"],buildsOn:[],enables:["3.1.2.A — Gold Price Risk Management"],rbiNote:"RBI's Master Direction on Gold Loans (2024 revision) specifically addresses appraisal quality requirements and mandates banks to demonstrate robust valuation controls.",mockup:null}],briefUCs:[{name:"Multi-pledge detection",desc:"AI cross-referencing of ornament descriptions and customer profiles across branches to detect the same gold pledged at multiple CUB branches — a significant fraud pattern in large gold loan portfolios."},{name:"LTV breach early alert",desc:"Real-time monitoring of gold price against outstanding loan amounts, with automated customer notification and branch alert when any account approaches the 75% RBI LTV cap."},{name:"Gold loan appraiser certification tracking",desc:"Automated tracking of appraiser certification status, retraining completion, and quality score — ensuring CUB's gold loan appraisal capability stays at standard across all 875 branches."},{name:"New product — gold OD intelligence",desc:"AI identification of gold loan customers with repeat borrowing behaviour who would benefit from a gold-backed overdraft (standing OD against pledged gold) — product conversion intelligence."},{name:"Gold loan interest income optimisation",desc:"Analysis of gold loan scheme mix across branches — identifying branches where scheme mix is suboptimal (too many low-yield OD schemes vs higher-yield bullet schemes) and quantifying revenue improvement potential."}]},{id:"D3.1.3",name:"Gold Loan Vault Management",deepUCs:[],briefUCs:[{name:"Vault audit intelligence",desc:"AI-assisted vault audit preparation — generating audit samples, cross-referencing packet weights against Finacle records, and flagging discrepancies for physical verification before RBI audit."},{name:"Gold packet reconciliation",desc:"Automated daily reconciliation of gold packets in vault against Finacle gold loan records — flagging any discrepancy between physical inventory and system records immediately."},{name:"Vault capacity optimisation",desc:"AI forecasting of vault capacity requirements by branch based on gold loan growth projections — enabling proactive vault expansion or inter-branch packet transfer planning."},{name:"Insurance coverage adequacy",desc:"Real-time monitoring that CUB's gold vault insurance coverage is adequate as the gold price fluctuates — triggering automatic coverage top-up requests when gold price rises expose under-coverage."}]}]},{id:"D3.2",name:"Agricultural Term Loans",subdepts:[{id:"D3.2.1",name:"Crop Loans (KCC)",deepUCs:[{id:"3.2.1.A",name:"Satellite-Powered Crop Loan Risk Assessment",tier:"Scale-Up",rbi:true,cubCtx:"CUB's agri portfolio is concentrated in Tamil Nadu's Cauvery delta — one of India's most agriculturally productive but also most drought-vulnerable geographies. CUB's agri NPAs have a strong seasonal and district-level correlation with monsoon performance — a relationship that satellite data can quantify with 6-8 week lead time over ground-level repayment failure signals.",pain:"Agricultural credit risk in Tamil Nadu is driven by crop outcomes — rainfall, pest pressure, commodity prices, irrigation availability. CUB's credit officers assess agri loan risk at origination using land records and historical farming data — a static assessment that doesn't track how the crop actually develops.",what:"AIDF integrates satellite-derived crop health indices (NDVI from ISRO's Bhuvan platform) with CUB's agricultural loan portfolio by geography. When satellite data shows below-normal crop health in a district where CUB has significant agri loan exposure, AIDF generates a District Crop Stress Alert — quantifying at-risk portfolio, predicting probability of increased delinquency, and recommending proactive interventions.",dataInputs:[{l:"Finacle agri loan data — borrower address, crop type, loan amount",dr:"g"},{l:"NDVI satellite data — ISRO Bhuvan API (publicly available)",dr:"r"},{l:"IMD rainfall and forecast data — Indian Meteorological Department",dr:"a"},{l:"Tamil Nadu agriculture department — district crop area data",dr:"a"},{l:"Government drought/flood declaration data",dr:"a"}],outcomes:["60-75 day advance warning of crop stress impact on CUB's agri portfolio","Government relief scheme linkage — AIDF identifies applicable schemes proactively","20-25% reduction in agri NPA formation through early intervention"],buildsOn:["5.3.2.A — Multi-Signal EWS Engine"],enables:[],rbiNote:"RBI's emerging climate risk guidance and its long-standing emphasis on agricultural credit risk management directly supports investment in satellite-based crop monitoring.",mockup:null}],briefUCs:[{name:"KCC utilisation optimisation",desc:"AI monitoring of KCC account utilisation patterns to distinguish seasonal drawdown (normal) from distress-driven borrowing (abnormal) — flagging accounts where pattern suggests financial stress."},{name:"Interest subvention claim automation",desc:"Automated identification and tracking of all KCC loans eligible for government interest subvention, preparation of subvention claims, and follow-up on pending disbursements."},{name:"Crop insurance adoption monitoring",desc:"AI tracking of PMFBY insurance linkage across CUB's KCC portfolio, identifying uninsured borrowers before crop season and generating outreach campaigns."},{name:"Agri loan restructuring under government schemes",desc:"AI identification of agri loans eligible for restructuring under RBI's special dispensations for natural calamities — automated preparation of restructuring documentation."},{name:"Farmer distress early detection",desc:"AI aggregation of TNAU (Tamil Nadu Agricultural University) advisories, commodity price movements, and local market price data to identify farmer income distress signals before they reach CUB's loan portfolio."},{name:"KCC renewal intelligence",desc:"For KCC borrowers approaching annual renewal, AIDF pre-assesses renewal eligibility using satellite crop health, commodity prices, and repayment behaviour — enabling pre-sanctioned renewals."}]}]},{id:"D3.3",name:"Rural & Priority Sector Lending",subdepts:[{id:"D3.3.1",name:"SHG / JLG Lending",deepUCs:[],briefUCs:[{name:"SHG group health scoring",desc:"AI monitoring of SHG group health indicators — meeting attendance, savings regularity, member credit bureau signals — to identify at-risk SHGs before repayment failures occur."},{name:"SHG credit graduation intelligence",desc:"AI identification of individual SHG members ready to graduate to individual micro-credit products — expanding CUB's retail credit base through the SHG network."},{name:"JLG performance monitoring",desc:"Portfolio monitoring of JLG loans with early warning on group cohesion breakdown — detecting when the joint liability mechanism is weakening before individual defaults occur."},{name:"MFI partnership intelligence",desc:"For CUB's BC/BF and MFI partnerships, AI monitoring of partner portfolio quality, collection efficiency, and over-indebtedness risk in shared geographies."}]},{id:"D3.3.2",name:"Priority Sector Compliance",deepUCs:[],briefUCs:[{name:"PSL gap prediction & management",desc:"Real-time PSL target tracking with monthly forecasts of likely achievement vs target for each sub-category, enabling CUB to direct lending activity in time to achieve targets without RIDF contributions."},{name:"PSLC buy/sell decision intelligence",desc:"AI model optimising CUB's PSLC trading decisions — whether to buy or sell certificates, which categories, at what price, and timing — based on real-time PSL achievement and market pricing."},{name:"Priority sector data quality assurance",desc:"Automated verification of PSL classification of loans against RBI Master Direction criteria — detecting mis-classification before it results in regulatory findings."},{name:"Weaker section lending optimisation",desc:"AI analysis of CUB's weaker section lending gap and identification of specific products and geographies where CUB can expand lending to SC/ST and other weaker section borrowers."},{name:"BC/BF network performance monitoring",desc:"AI tracking of Business Correspondent and Business Facilitator performance — transaction volumes, customer service quality, and credit portfolio quality in their designated geographies."},{name:"Financial inclusion product intelligence",desc:"AI recommendation of appropriate financial inclusion products (Jan Dhan accounts, micro-insurance, pension schemes, Atal Pension Yojana) for CUB's rural customer base."}]}]}]},{id:"D1",num:"1",name:"Retail Banking",color:"#0B6E82",desc:"CASA, FD/RD, home loans, LAP, personal loans, vehicle loans, credit cards (recently launched), digital banking channels, retail collections. CUB's foundational customer franchise across Tamil Nadu.",depts:6,subdepts:19,ucs:52,departments:[{id:"D1.1",name:"Liability Products",subdepts:[{id:"D1.1.1",name:"Savings & Current Accounts (CASA)",deepUCs:[{id:"1.1.1.A",name:"CASA Attrition Prediction & Retention Engine — E3",tier:"Quick Win",rbi:false,cubCtx:"CUB's CASA base in Tamil Nadu is under competitive pressure from private sector banks and small finance banks. CASA is CUB's lowest-cost funding source and its most valuable relationship anchor — every lost CASA customer is both a funding cost increase and a cross-sell opportunity permanently closed.",pain:"CUB loses CASA customers to competitors but detects departure only after the account has gone dormant or been closed. The warning signs are visible months before closure: declining balance, falling transaction frequency, salary credit stopping, standing instructions being cancelled. Systematic monitoring across 875 branches is impossible manually.",what:"AIDF builds a CASA Attrition Predictor generating monthly churn probability score for every active CUB savings and current account. 20+ behavioural signals: 3-month balance trend, transaction frequency change, salary credit pattern, standing instruction cancellations, digital channel usage drop, outward fund transfer to other banks increasing, recent complaints. High churn accounts receive targeted retention interventions calibrated to the detected reason for churn risk.",dataInputs:[{l:"Finacle CASA account data — daily balance, transactions, credits, debits",dr:"g"},{l:"Mobile banking login data — engagement frequency",dr:"g"},{l:"Complaint history — CRM system",dr:"g"},{l:"Product holding data — current product penetration",dr:"g"},{l:"Customer demographic data — CBS master",dr:"g"}],outcomes:["30-45 day advance warning of CASA attrition for 70%+ of at-risk accounts","20-30% improvement in retention rate for contacted customers","CASA balance improvement — retaining high-value customers whose balances were declining"],buildsOn:[],enables:["1.1.2.A — FD Renewal Prediction","1.2.1.A — Home Loan Propensity Model"],rbiNote:null,mockup:null}],briefUCs:[{name:"CASA upgrade propensity",desc:"Identifying savings account customers likely to respond to current account upgrades based on transaction volumes and business activity signals."},{name:"Dormant account reactivation campaigns",desc:"AI-driven identification of dormant accounts with highest reactivation probability and personalised outreach triggers — regulatory compliance and revenue recovery combined."},{name:"Balance concentration risk monitoring",desc:"Identifying accounts where a single large depositor's balance is a significant proportion of branch CASA base — providing early warning of concentration risk."},{name:"CASA cross-sell intelligence",desc:"For every CASA customer, AIDF identifies the most relevant product they don't hold — FD, loan, insurance, debit card upgrade — with timing and rationale."},{name:"Salary account acquisition intelligence",desc:"AI identification of companies in CUB's catchment whose employees are paid salary through other banks — generating targeted corporate salary account acquisition leads."},{name:"Current account upgrade intelligence",desc:"Identifying sole proprietor savings accounts that have current account-like transaction patterns — enabling proactive product upgrade conversations."},{name:"Retail banking customer lifetime value model",desc:"AI model estimating 10-year customer lifetime value for every CUB retail customer — factoring in current product holding, growth trajectory, and churn probability — enabling rational relationship investment decisions."},{name:"Premium customer segment intelligence",desc:"AI identification and nurturing of CUB's top 5% retail customers by lifetime value — generating personalised retention and growth plans for these highest-value relationships."},{name:"NRI customer relationship deepening",desc:"AI intelligence on CUB's NRI customer base — remittance patterns, product holding, family relationship linkages — enabling targeted NRI banking product campaigns and relationship deepening."},{name:"Retired professional segment intelligence",desc:"AI targeting of retiring professionals (senior government employees, PSU executives, teachers) in Tamil Nadu — a segment with large terminal benefits requiring investment and banking solutions that CUB is well positioned to serve."},{name:"Joint family banking intelligence",desc:"AI mapping of family relationships within CUB's customer base — identifying joint family units where CUB serves some but not all members — enabling family relationship banking strategies."},{name:"Digital onboarding completion intelligence",desc:"AI tracking of customers who started but didn't complete digital account opening or product applications — identifying at what step abandonment occurred and generating personalised re-engagement triggers."},{name:"Home loan balance sheet optimisation",desc:"AI analysis of CUB's home loan book duration, rate composition (fixed vs floating), and prepayment risk — generating ALCO-ready recommendations for portfolio management."},{name:"Retail collections digital self-cure",desc:"AI identification of retail loan accounts (personal loan, vehicle loan, credit card) with high self-cure propensity — enabling digital self-cure channels (payment links, restructuring portal) to reduce collection cost."},{name:"Branch-wise retail business intelligence",desc:"AI analysis of retail product penetration, customer acquisition cost, and revenue per customer by branch — enabling retail banking management to allocate resources to highest-ROI branches."},{name:"Retail loan pre-EMI delinquency prediction",desc:"AI model predicting which newly disbursed retail loans are most likely to miss the first EMI — enabling proactive outreach before the first DPD, when cure rates are highest."},{name:"Debit card usage enhancement intelligence",desc:"AI analysis of CUB debit card usage patterns — identifying customers who rarely use their card and the specific merchant categories that would increase usage if activated through targeted offers."},{name:"Women-focused banking segment intelligence",desc:"AI identification of women customers in CUB's base with specific product needs — women entrepreneur MSME loans, women-specific savings schemes, self-help group graduation — enabling CUB to build a differentiated women banking proposition."}]},{id:"D1.1.2",name:"Fixed & Recurring Deposits",deepUCs:[{id:"1.1.2.A",name:"FD Renewal Prediction & Proactive Retention",tier:"Quick Win",rbi:false,cubCtx:"CUB's LCR at 269% — the highest in its peer universe — reflects a strong deposit franchise. Maintaining this franchise requires active FD renewal management. The 15-day maturity notice that currently triggers the renewal conversation is structurally too late — the retention decision is effectively made 30-45 days before maturity.",pain:"Current process sends a system-generated maturity notice 15 days before due date. Renewal rate depends on whether the branch follows up. Many FDs — particularly older customers or smaller branches — mature and are withdrawn without any proactive retention conversation.",what:"AIDF builds FD Retention Intelligence: 45 days before each FD maturity, generates renewal probability score and recommended retention action. High-value FDs with low renewal probability get personal RM call with tailored offer. Medium probability get automated personalised SMS with current best rate and one-tap renewal. Low-value high-probability get auto-renewed. Also identifies FD customers holding multiple FDs at other banks — generating share-of-wallet upgrade offers.",dataInputs:[{l:"Finacle FD data — maturity date, amount, customer profile, renewal history",dr:"g"},{l:"Mobile banking engagement data — digital interaction frequency",dr:"g"},{l:"Customer relationship data — product holding, tenure, value",dr:"g"},{l:"Market rate data — competitor FD rates for benchmarking",dr:"a"},{l:"Bureau data — FDs at other institutions",dr:"g"}],outcomes:["FD renewal rate improvement of 8-12 percentage points","Advance identification of large FD maturity events for treasury/ALM liquidity planning","Personalised renewal offers improve acceptance vs standard maturity notice"],buildsOn:["1.1.1.A — CASA Attrition Predictor"],enables:["4.1.1.A — ALM Dashboard"],rbiNote:null,mockup:null}],briefUCs:[{name:"TDS optimisation advisory",desc:"AI identification of customers approaching Rs.50,000 interest threshold (TDS trigger) who could benefit from Form 15G/H filing reminders — a genuine customer service reducing complaint calls."},{name:"FD-backed loan propensity",desc:"Identifying FD holders with potential short-term liquidity needs who would benefit from OD against FD rather than breaking their FD — retaining the deposit and generating loan income."},{name:"Bulk deposit early warning",desc:"Identifying large institutional FD customers approaching maturity with behavioural signals suggesting non-renewal — enabling ALCO to plan for liquidity impact."},{name:"Recurring deposit completion intelligence",desc:"Monitoring RD accounts approaching completion — predicting rollover vs withdrawal behaviour and enabling proactive conversations before the RD matures."},{name:"Senior citizen deposit relationship management",desc:"Dedicated intelligence layer for senior citizen depositors — highest-value, most loyal segment — tracking health of relationship and flagging any signs of diminishing engagement or nominee change."},{name:"NRI deposit intelligence",desc:"AI monitoring of NRI deposit relationships — FCNR, NRE, NRO — tracking deposit renewal behaviour, repatriation patterns, and cross-sell opportunities specific to NRI customers."}]}]},{id:"D1.2",name:"Retail Asset Products",subdepts:[{id:"D1.2.1",name:"Home Loan & LAP",deepUCs:[{id:"1.2.1.A",name:"Home Loan / LAP Propensity Model",tier:"Scale-Up",rbi:false,cubCtx:"CUB has set up a dedicated new sales vertical to focus on secured retail lending — signalling a strategic priority. Existing CUB customers have known repayment behaviour, verified income, and an established relationship — they are materially better quality leads than cold DSA sources.",pain:"CUB's home loan and LAP business relies on DSA leads (expensive, quality-variable), walk-ins (unpredictable), and referrals (underutilised). CUB has a large CASA and business banking customer base but no systematic intelligence on which existing customers are approaching home loan or LAP decision points.",what:"AIDF builds a Home Loan and LAP Propensity model scoring every eligible CUB CASA customer monthly. Propensity signals: recent large savings accumulation (down payment building), salary increment pattern (increased affordability), age bracket 28-42 (peak home buying years), bureau data (property enquiries, new mortgage at other banks), business banking customers with unlevered property (LAP opportunity), and life event triggers (marriage, first child — detectable via account naming changes, cheque payee patterns).",dataInputs:[{l:"Finacle CASA and loan data — account behaviour, product holdings",dr:"g"},{l:"Customer demographics — age, occupation, location (CBS master)",dr:"g"},{l:"Bureau data — property enquiries, new mortgage at other banks",dr:"g"},{l:"Digital banking behaviour — mobile banking engagement",dr:"g"},{l:"Life event proxy signals — account naming, cheque payee patterns",dr:"g"}],outcomes:["30-40% reduction in home loan customer acquisition cost vs DSA-sourced leads","Higher quality leads — existing customers approve and perform better","Home loan book growth acceleration — directly supporting CUB's new secured retail sales vertical"],buildsOn:["1.1.1.A — CASA Attrition Predictor"],enables:["5.2.1.A — Retail Credit Decision Support"],rbiNote:null,mockup:null}],briefUCs:[{name:"Property market intelligence for LAP",desc:"AI tracking of Tamil Nadu property market trends by micro-market to inform LAP pricing, LTV setting, and collateral risk assessment."},{name:"Balance transfer propensity model",desc:"Identifying existing home loan customers at competitor banks likely to consider balance transfer to CUB — using bureau signals (home loan at other bank, near reset dates)."},{name:"Construction-linked disbursement monitoring",desc:"For under-construction home loans with stage-wise disbursement, AI monitoring of construction progress signals to ensure disbursements align with actual construction."},{name:"Top-up loan propensity",desc:"AI identification of existing home loan customers with significant equity in their property and demonstrated repayment capacity who are likely to need a top-up loan."},{name:"Home loan rate sensitivity analysis",desc:"For each interest rate change cycle, AIDF models which segments of CUB's home loan portfolio are most vulnerable to prepayment or balance transfer — enabling proactive retention interventions."},{name:"Legal due diligence automation",desc:"AI-assisted title deed verification — extracting property history from digitised documents, flagging encumbrances, litigation history, and title defects before disbursement."}]},{id:"D1.2.2",name:"Vehicle & Personal Loans",deepUCs:[{id:"1.2.2.A",name:"Retail Loan Cross-Sell Propensity Engine",tier:"Quick Win",rbi:false,cubCtx:"CUB's retail banking customer base in Tamil Nadu represents significant untapped cross-sell potential. The bank has good penetration in CASA and FD but lower penetration in personal loans, vehicle loans, and consumer durable loans relative to its relationship depth.",pain:"Retail branch staff identify cross-sell opportunities ad hoc — waiting for customers to walk in and ask, or making undifferentiated batch offers to all customers. High-value propensity customers are not systematically identified and prioritised.",what:"AIDF builds a Retail Cross-Sell Propensity engine that scores every CUB retail customer monthly against each major retail product — personal loan, vehicle loan, consumer durable loan, insurance, and debit card upgrade. For each customer-product combination, AIDF identifies the trigger event (income increase, vehicle age signal from CBS payee patterns, home purchase signal) and the optimal outreach timing.",dataInputs:[{l:"Finacle CASA and retail loan data",dr:"g"},{l:"Customer demographics — age, occupation, income proxy",dr:"g"},{l:"Bureau data — product holding at other banks",dr:"g"},{l:"Transaction data — payee patterns, UPI merchants",dr:"g"}],outcomes:["20-30% improvement in retail cross-sell conversion rate","Reduction in unsolicited cross-sell calls that damage customer relationships","Revenue per customer improvement across the retail book"],buildsOn:["1.1.1.A — CASA Attrition Predictor"],enables:[],rbiNote:null,mockup:null}],briefUCs:[{name:"Vehicle loan pre-approval targeting",desc:"AI identification of CASA customers likely to purchase a vehicle in the next 3-6 months based on savings accumulation, income, age, and digital research behaviour (if available)."},{name:"Personal loan responsible lending filter",desc:"AI model identifying customers who are good personal loan risks vs those where lending would exacerbate existing financial stress — ensuring responsible lending while growing the book."},{name:"Consumer durable EMI intelligence",desc:"For CUB's consumer durable finance partnerships, AI demand forecasting by product category and geography to optimise inventory financing and EMI campaign targeting."},{name:"Two-wheeler loan expansion intelligence",desc:"AI targeting of CASA customers in semi-urban and rural branches likely to be in the market for two-wheeler loans — CUB's largest vehicle loan segment by volume."},{name:"Insurance cross-sell intelligence",desc:"AI identification of CUB loan customers who don't have loan protection insurance — generating targeted, compliant cross-sell conversations that genuinely protect the customer."}]},{id:"D1.2.5",name:"Credit Cards — New Programme",deepUCs:[{id:"1.2.5.A",name:"Credit Card Acquisition Scoring — Cold Start Solution",tier:"Quick Win",rbi:false,cubCtx:"CUB has recently launched a credit card programme. Without card-specific historical data (the cold-start problem), most new issuers rely on generic bureau scores — a weak predictor for card-specific behaviour. CUB has a powerful alternative: years of behavioural data on its own CASA and loan customers.",pain:"CUB has recently launched a credit card programme. Without a sophisticated acquisition scoring model, CUB risks either rejecting too many eligible customers (slow portfolio build) or approving too many marginal customers (high early NPA). No card-specific historical data exists to train a model on.",what:"AIDF solves the cold-start problem using CUB's existing customer data as proxy: CASA account behaviour (spending patterns, income regularity, overdraft usage), existing loan repayment history (EMI discipline), bureau credit card performance at other banks, and digital banking engagement (active mobile banking users are lower-risk card customers). As the card portfolio matures, the model transitions to incorporate card-specific signals.",dataInputs:[{l:"Finacle CASA and loan data — account behaviour, repayment history",dr:"g"},{l:"Bureau data — existing card performance at other banks, balance, utilisation",dr:"g"},{l:"Digital banking engagement data — mobile banking activity",dr:"g"},{l:"Customer demographic data — CBS master",dr:"g"}],outcomes:["Credit card NPA rate below industry average from programme launch","Faster portfolio build — confident approval of right customer segments from day one","Foundation for card-specific behavioural scoring as the portfolio matures"],buildsOn:["1.1.1.A — CASA Attrition Predictor"],enables:["1.2.5.B — Card Spend Analytics"],rbiNote:null,mockup:null}],briefUCs:[{name:"Card spend analytics and customer intelligence",desc:"Card spend intelligence layer from programme month one — spend category analysis, merchant-level pattern recognition, spend velocity monitoring, and lifestyle segmentation."},{name:"Credit limit optimisation",desc:"Continuous monitoring of card utilisation, payment behaviour, and income signals to recommend limit increases for good-behaviour customers and limit reductions for deteriorating customers."},{name:"Card delinquency early warning",desc:"Specific early warning model for credit cards — payment due with no payment, minimum payment only (known distress signal), utilisation spike — generating collections contact triggers 10-15 days earlier."},{name:"Reward programme optimisation",desc:"AI analysis of which reward programme features drive the highest card usage frequency and lowest dormancy — optimising the CUB card reward structure for the Tamil Nadu customer base."},{name:"Merchant acquisition intelligence",desc:"AI identification of high-footfall merchants in CUB's geographic catchment for CUB credit card merchant acquisition — prioritising merchants whose customer base overlaps with CUB's retail base."},{name:"Card fraud early detection",desc:"Transaction-level fraud scoring for CUB's new credit card programme — pattern recognition for card-not-present fraud, velocity checks, and geographic anomaly detection."}]}]},{id:"D1.3",name:"Digital Banking",subdepts:[{id:"D1.3.1",name:"Mobile & Internet Banking",deepUCs:[],briefUCs:[{name:"Digital adoption propensity scoring",desc:"AI model identifying CUB customers most likely to convert to digital banking — enabling targeted digital onboarding campaigns at branches most likely to achieve adoption targets."},{name:"Mobile banking session intelligence",desc:"Analysis of mobile banking session patterns to identify friction points, features driving engagement, and features with high drop-off — informing app UX improvement priorities."},{name:"UPI payment intelligence",desc:"AI analysis of CUB customer UPI transaction patterns — identifying customers directing significant UPI payments through other bank apps who could be re-engaged with CUB's own UPI."},{name:"Digital banking customer health score",desc:"Composite health score for each digital banking customer combining transaction frequency, product penetration, and engagement depth — identifying at-risk digital relationships."},{name:"Internet banking fraud detection",desc:"Session-level fraud scoring for internet banking — unusual login geography, device fingerprint anomaly, transaction pattern deviation, and account takeover indicators."},{name:"Digital NPS and complaint intelligence",desc:"AI analysis of digital banking feedback, app store reviews, and complaint themes — generating prioritised product improvement recommendations for the digital banking team."}]}]}]},{id:"D4",num:"4",name:"Treasury & Investments",color:"#4C1D95",desc:"ALM (CUB LCR 269% — highest in peer universe), G-Sec portfolio management, forex dealing and advisory, money market operations, market risk management, capital adequacy management.",depts:6,subdepts:20,ucs:42,departments:[{id:"D4.1",name:"Asset Liability Management",subdepts:[{id:"D4.1.1",name:"Liquidity Management & ALCO Support",deepUCs:[{id:"4.1.1.A",name:"Intelligent ALM Dashboard & Liquidity Intelligence",tier:"Scale-Up",rbi:true,cubCtx:"CUB's LCR of 269% — the highest in its South India private bank peer universe — represents both a regulatory achievement and a significant opportunity cost. The excess liquidity above the regulatory minimum is working at sub-optimal yields. Quantifying exactly how much excess exists requires daily intelligence, not a monthly ALCO pack.",pain:"CUB's ALCO meets monthly and reviews an ALM pack prepared manually over 3-4 days. The monthly cadence means significant liquidity or rate environment changes between ALCO meetings are not systematically captured. With CUB's LCR at 269%, there is significant opportunity cost from excess liquidity.",what:"AIDF builds a live ALM Intelligence Dashboard updating daily: real-time LCR and NSFR computation, structural liquidity gap analysis, NII sensitivity under multiple rate scenarios (parallel shift, twist, steepening), deposit maturity profile with behavioural stickiness adjustment, and excess liquidity optimisation recommendation. Monthly ALCO pack auto-generated from this live data.",dataInputs:[{l:"Finacle — daily deposit and loan position, maturity profile",dr:"g"},{l:"Market data — interest rates, G-Sec yields (Bloomberg/Reuters)",dr:"r"},{l:"Historical deposit behaviour data — stickiness analysis",dr:"g"},{l:"RBI LCR/NSFR parameters — regulatory framework",dr:"g"}],outcomes:["ALCO decision quality improvement — decisions based on daily vs month-old data","Excess liquidity identificati .",what:"AIDF builds an Enterprise Data Quality Intelligence platform continuously monitoring CUB's Finacle and downstream data across 5 dimensions: completeness (all required fields populated), accuracy (values conform to expected patterns and cross-system consistency), consistency (same customer appears identically across CBS, CRM, and LOS), timeliness (data refreshed within required windows), and uniqueness (no duplicate customer records or loan accounts). For each data quality issue, AIDF scores it by business impact and generates a prioritised remediation list.",dataInputs:[{l:"Finacle master data — customer, account, loan, deposit (all CBS data)",dr:"g"},{l:"LOS data — loan origination system records",dr:"g"},{l:"CRM data — customer relationship records",dr:"g"},{l:"Document management system — document completeness",dr:"g"},{l:"Regulatory return data — quality cross-checks",dr:"g"}],outcomes:["Data quality score improvement across all 5 dimensions — establishing a baseline CUB has never had","Regulatory reporting error reduction — many RBI return errors trace to underlying data quality issues","AML false positive reduction — better customer data improves AML model accuracy","Foundation for all other AIDF use cases across all 10 divisions"],buildsOn:[],enables:["ALL other AIDF use cases — this is the foundational capability"],rbiNote:"RBI's BCBS 239 principles (data aggregation and risk reporting) and increasing scrutiny of data quality in regulatory submissions directly support investment in enterprise data quality management.",mockup:null}],briefUCs:[{name:"Customer master data deduplication",desc:"AI-powered deduplication — identifying and merging duplicate customer records across CBS, LOS, and CRM — improving customer 360 view and AML effectiveness."},{name:"Feature store for AIDF",desc:"Building and maintaining CUB's enterprise feature store — pre-computed customer, account, transaction, and external data features that feed all AIDF models across all 10 divisions."},{name:"DPDP Act data inventory",desc:"AI-assisted mapping of all personal data held by CUB — creating the data inventory required for DPDP Act 2023 compliance and enabling purpose limitation enforcement."},{name:"Data lineage intelligence",desc:"AI-generated data lineage maps showing where each data element in CUB's regulatory returns and risk reports originates — critical for resolving data quality issues at source."},{name:"Finacle upgrade impact assessment",desc:"When Infosys releases a new Finacle version, AIDF analyses all AIDF models and data pipelines for potential impact from schema changes — generating a structured upgrade testing plan."},{name:"API data quality monitoring",desc:"Real-time monitoring of all external API data feeds (GST, bureau, MCA, eCourt) for data quality issues — detecting feed failures, data degradation, and latency issues before they affect downstream models."},{name:"Application performance monitoring intelligence",desc:"AI monitoring of CUB's critical banking applications (mobile banking, internet banking, core banking) for performance degradation — predictive alerts before SLA breaches."},{name:"Database performance intelligence",desc:"AI analysis of database query performance across CUB's banking applications — identifying slow queries, table lock contention, and index optimisation opportunities before they affect end users."},{name:"Network performance monitoring",desc:"AI monitoring of CUB's WAN and branch network performance — detecting congestion, high latency, and packet loss patterns that could affect branch operations before they generate incidents."},{name:"IT service desk intelligence",desc:"AI analysis of IT service desk ticket patterns — identifying recurrent incidents, self-service deflection opportunities, and knowledge base gaps — improving first-call resolution rates."},{name:"Software licence compliance intelligence",desc:"AI monitoring of software licence utilisation across CUB's IT estate — identifying over-licensed products (cost reduction) and under-licensed products (compliance risk)."},{name:"IT change management risk intelligence",desc:"AI assessment of IT change risk before each change is approved — predicting the probability of incidents based on change type, affected systems, and historical change outcomes."},{name:"Backup and recovery validation",desc:"AI monitoring of backup completion status, integrity verification results, and recovery test outcomes — ensuring CUB's data recovery capability meets RPO requirements."},{name:"IT vendor performance intelligence",desc:"AI tracking of IT vendor SLA performance — Infosys (Finacle), network vendors, cloud providers — with automated escalation when SLA breaches accumulate."},{name:"Digital banking infrastructure capacity",desc:"AI forecasting of digital banking infrastructure capacity requirements based on mobile banking user growth, transaction volume trends, and planned product launches."},{name:"IT asset lifecycle management",desc:"AI analysis of CUB's IT asset lifecycle — identifying assets approaching end of life and generating proactive replacement planning and budgeting recommendations."},{name:"Technology debt intelligence",desc:"AI assessment of CUB's technology debt — legacy systems, outdated integrations, manual workarounds — prioritising modernisation investments by business impact and risk."},{name:"Open source vulnerability monitoring",desc:"AI monitoring of open source components in CUB's software stack for newly disclosed vulnerabilities — generating prioritised patching recommendations within 24 hours of disclosure."},{name:"Finacle customisation impact tracking",desc:"AI tracking of all CUB-specific Finacle customisations — ensuring each customisation is tested and validated after every Finacle upgrade to prevent business disruption."},{name:"Digital onboarding journey analytics",desc:"AI analysis of digital account opening and loan application journeys — measuring drop-off at each step and generating UX improvement recommendations to increase completion rates."},{name:"AI ethics and fairness governance",desc:"AI governance framework documentation for CUB's board and RBI — covering how AIDF models are trained, tested for bias, monitored, and controlled — meeting emerging RBI AI governance expectations."},{name:"Data residency and sovereignty compliance",desc:"AI monitoring of CUB's cloud data flows to ensure all customer data remains within India's geographic boundaries — complying with RBI data residency requirements."},{name:"IT audit automation",desc:"AI-powered continuous IT audit — automated testing of segregation of duties controls, access rights compliance, and parameter change authorisation across Finacle CBS."},{name:"Blockchain and DLT monitoring",desc:"AI monitoring of CUB's participation in RBI-sanctioned blockchain networks (trade finance, letter of credit, interbank reconciliation) — transaction validation and network health monitoring."},{name:"Open banking intelligence",desc:"AI analysis of CUB's Account Aggregator ecosystem participation — consent patterns, data sharing volumes, and third-party application performance — enabling data-driven AA strategy decisions."}]},{id:"D8.5.2",name:"Analytics & AI Platform",deepUCs:[{id:"8.5.2.A",name:"AIDF Model Performance Monitoring Platform",tier:"Quick Win",rbi:true,cubCtx:"Once deployed, AIDF models need continuous monitoring — a model that was accurate when deployed can drift as the economic environment changes, as CUB's portfolio mix shifts, or as the underlying data quality changes. Without systematic monitoring, models degrade silently.",pain:"AIDF models deployed across CUB's divisions will generate recommendations that influence credit decisions, collections actions, and customer interactions. Without ongoing performance monitoring, model degradation will not be detected until downstream outcomes deteriorate — by which time significant damage may have occurred.",what:"AIDF builds a Model n, performance metrics, known limitations) for each deployed AIDF model — RBI AI governance requirement documentation."},{name:"Analytics self-service platform",desc:"AIDF-powered analytics platform enabling business users across CUB to query data and generate insights without requiring data science support for routine analysis requests."}]}]},{id:"D8.4",name:"Cybersecurity",subdepts:[{id:"D8.4.1",name:"Security Operations Centre (SOC)",deepUCs:[{id:"8.4.1.A",name:"AI-Powered SOC Threat Detection",tier:"Transformation",rbi:true,cubCtx:"CUB is the IBA Best Technology Bank for 3 consecutive years — a distinction that comes with an implicit expectation of advanced cyber defences. India's banking sector is under sustained cyberattack pressure. CUB's Finacle CBS and payment systems are high-value targets.",pain:"CUB's SOC processes thousands of security alerts daily. Most are false positives — routine system activity triggering rule-based alerts. Security analysts spend the majority of their time triaging noise rather than investigating genuine threats. Sophisticated attacks specifically designed to avoid detection by rule-based systems are under-detected.",what:"AIDF builds an ML-enhanced SOC capability: Alert prioritisation scoring (every security alert scored for genuine threat probability, reducing analyst workload by 60-70%), threat hunting (proactive scanning of full log data for indicators of compromise that didn't generate an alert), and UEBA (User and Entity Behaviour Analytics — detecting insider threats and compromised credentials through behavioural baseline monitoring).",dataInputs:[{l:"Firewall, IDS, and endpoint logs — real-time SIEM feed",dr:"g"},{l:"User access logs — AD and Finacle access events",dr:"g"},{l:"Network flow data — internal network traffic patterns",dr:"g"},{l:"Threat intelligence feeds — external IOC data",dr:"r"}],outcomes:["60-70% reduction in false positive alert volume — analyst productivity improvement","Improved detection of sophisticated attacks that bypass rule-based detection","Insider threat detection capability — currently minimal at most banks of CUB's size"],buildsOn:[],enables:[],rbiNote:"RBI's cyber security framework (2016 and subsequent updates) and the requirement for banks to have a 24/7 SOC with threat detection capabilities directly support investment in AI-enhanced SOC.",mockup:null}],briefUCs:[{name:"Privileged access anomaly detection",desc:"AI monitoring of privileged user (admin, DBA, Finacle CBS parameter) activity for unusual patterns — after-hours access, bulk data queries, parameter changes outside change management."},{name:"SWIFT CSP compliance monitoring",desc:"Automated tracking of SWIFT Customer Security Programme control compliance — a regulatory requirement for all SWIFT-connected banks."},{name:"Vulnerability prioritisation intelligence",desc:"AI scoring of security vulnerabilities based on exploitability, asset criticality, and threat intelligence — enabling prioritisation by actual risk rather than CVSS score alone."},{name:"Phishing simulation intelligence",desc:"AI-driven phishing simulation programme targeting employees most likely to be susceptible based on past simulation performance and role profile — optimising security awareness training investment."},{name:"API security monitoring",desc:"AI monitoring of all external API connections (GST, bureau, Aadhaar, payment networks) for unusual access patterns, data exfiltration risk, and API abuse."},{name:"DLP intelligence",desc:"AI-enhanced Data Loss Prevention — detecting sensitive customer data exfiltration through email, USB, cloud upload, and print channels — with precision targeting that reduces false positives."},{name:"Third-party security risk scoring",desc:"AI scoring of all third-party vendors with access to CUB's systems or data — tracking security posture changes and generating proactive risk mitigation recommendations."}]}]},{id:"D8.2",name:"IT Operations & Infrastructure",subdepts:[{id:"D8.2.1",name:"IT Infrastructure Operations",deepUCs:[],briefUCs:[{name:"Predictive infrastructure maintenance",desc:"AI analysis of IT infrastructure performance metrics — CPU, memory, network, storage — predicting hardware failures before they occur and scheduling maintenance proactively."},{name:"Finacle performance optimisation",desc:"AI monitoring of Finacle CBS query performance, batch processing times, and response latency — identifying optimisation opportunities to improve end-of-day processing speed."},{name:"Cloud cost optimisation intelligence",desc:"For CUB's cloud workloads, AI analysis of resource utilisation patterns — identifying over-provisioned resources and recommending right-sizing to reduce cloud costs without impacting performance."},{name:"DR readiness monitoring",desc:"Automated testing and monitoring of disaster recovery readiness — verifying that DR systems can achieve RPO and RTO targets without waiting for an actual incident."},{name:"IT capacity planning intelligence",desc:"AI forecasting of IT infrastructure capacity requirements based on business growth projections, new product launches, and seasonal demand patterns — enabling proactive capacity expansion."},{name:"Incident management intelligence",desc:"AI-assisted incident triage and root cause analysis — automatically correlating incidents across multiple systems to identify the root cause faster and reduce MTTR."},{name:"Patch compliance monitoring",desc:"Automated tracking of patch compliance across all IT assets — identifying unpatched systems by risk priority and generating automated escalation for overdue critical patches."}]}]}]},{id:"D9",num:"9",name:"HR & Administration",color:"#4A1942",desc:"Talent acquisition (875+ branch staff), learning and development, performance management, HR operations and employee lifecycle, employee relations and welfare, administration and facilities including RBI-mandated sensitive post rotation.",depts:6,subdepts:19,ucs:42,departments:[{id:"D9.1",name:"Talent Acquisition",subdepts:[{id:"D9.1.1",name:"Recruitment Operations",deepUCs:[{id:"9.1.1.A",name:"AI-Powered Recruitment Intelligence",tier:"Quick Win",rbi:false,cubCtx:"CUB's growth across MSME lending, gold loans, and its new secured retail sales vertical requires significant talent acquisition at scale. Recruiting the right people for 875 branches distributed across Tamil Nadu — particularly for specialised roles like gold loan appraisers and MSME relationship managers — is operationally complex.",pain:"CUB's recruitment process is largely manual — job posting, CV screening, interview coordination, and offer management through spreadsheets. Time-to-hire is long, quality of hire is inconsistent, and the effort of recruiting for 875 branches is disproportionate to the output.",what:"AIDF builds a Recruitment Intelligence platform: CV screening and ranking (AI matching of candidate CVs against role requirements — ranking candidates by fit before human review), interview question generation (role-specific, behavioural interview questions based on job requirements), offer acceptance prediction (AI model predicting which offers are likely to be declined — enabling proactive mitigation), and time-to-hire optimisation (bottleneck identification in the recruitment pipeline).",dataInputs:[{l:"Job descriptions and requirements — HRMS",dr:"g"},{l:"Candidate CVs — ATS (Applicant Tracking System)",dr:"g"},{l:"Historical hire performance data — joining rate, performance after joining",dr:"g"},{l:"Market salary data — external benchmarks",dr:"a"}],outcomes:["CV screening time reduction of 70-80%","Hire quality improvement — candidates ranked by AI show better post-joining performance","Time-to-hire reduction of 30-40% through process bottleneck elimination"],buildsOn:[],enables:[],rbiNote:null,mockup:null}],briefUCs:[{name:"Campus recruitment intelligence",desc:"AI analysis of campus placement data from Tamil Nadu colleges to identify institutions producing candidates who pe function chartLoanBook(){
  const data=[
    {label:'MSME & Business Banking',pct:44,color:'#2E3192',val:'₹23,349 Cr'},
    {label:'Retail Banking',pct:29,color:'#EC0677',val:'₹15,389 Cr'},
    {label:'Agriculture & Gold Loan',pct:17,color:'#15803D',val:'₹9,021 Cr'},
    {label:'Other',pct:10,color:'#6B7280',val:'₹5,307 Cr'}
  ];
  let cum=0;
  const cx=80,cy=80,r=65,ri=42;
  let paths='';
  data.forEach(d=>{
    const a1=cum*3.6*Math.PI/180,a2=(cum+d.pct)*3.6*Math.PI/180;
    const x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1);
    const x2=cx+r*Math.sin(a2),y2=cy-r*Math.cos(a2);
    const xi1=cx+ri*Math.sin(a1),yi1=cy-ri*Math.cos(a1);
    const xi2=cx+ri*Math.sin(a2),yi2=cy-ri*Math.cos(a2);
    const lg=d.pct>50?1:0;
    paths+=`<path d="M${xi1},${yi1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg},0 ${xi1},${yi1}Z" fill="${d.color}" opacity="0.92"/>`;
    cum+=d.pct;
  });
  const legend=data.map(d=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
    <div style="width:10px;height:10px;border-radius:2px;background:${d.color};flex-shrink:0"></div>
    <div><div style="font-size:11px;font-weight:600;color:var(--text2)">${d.pct}% — ${d.val}</div>
    <div style="font-size:10px;color:var(--text4)">${d.label}</div></div></div>`).join('');
  return `<div style="display:flex;align-items:center;gap:16px">
    <svg width="160" height="160" viewBox="0 0 160 160">${paths}
      <circle cx="80" cy="80" r="38" fill="white"/>
      <text x="80" y="76" text-anchor="middle" font-size="10" fill="var(--text4)" font-family="DM Sans">Total</text>
      <text x="80" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="var(--cub-blue)" font-family="DM Serif Display">₹53,066 Cr</text>
    </svg>
    <div>${legend}</div>
  </div>`;
}

function chartDivUCs(){
  const data=DIVS.map(d=>({name:d.name.split(' ').slice(0,2).join(' '),ucs:d.ucs,color:d.color}));
  const max=Math.max(...data.map(d=>d.ucs));
  const h=16,gap=6,w=220;
  const rows=data.map((d,i)=>{
    const bw=Math.round((d.ucs/max)*w);
    const y=i*(h+gap);
    return `<g>
      <text x="0" y="${y+12}" font-size="10" fill="var(--text3)" font-family="DM Sans">${d.name}</text>
      <rect x="110" y="${y}" width="${bw}" height="${h}" rx="3" fill="${d.color}" opacity="0.85"/>
      <text x="${110+bw+4}" y="${y+12}" font-size="10" font-weight="600" fill="${d.color}" font-family="DM Sans">${d.ucs}</text>
    </g>`;
  }).join('');
  const svgH=(h+gap)*data.length;
  return `<svg width="100%" height="${svgH}" viewBox="0 0 380 ${svgH}" style="display:block">${rows}</svg>`;
}

function tSD(id,src,dId){
  oSD[id]=!oSD[id];
  if(src==='div'&&cDiv)showDiv(cDiv.id);
  else if(src==='dept'&&dId)showDept(dId);
}
function tUC(id){
  oUC[id]=!oUC[id];
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
}
function tAF(id){
  oAF[id]=!oAF[id];
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
}

// SAVE UC
// ══════════════════════════════════════════════════════
function saveUC(sdId){
  const name=document.getElementById(`fn-${sdId}`)?.value?.trim();
  const type=document.getElementById(`ft-${sdId}`)?.value;
  const tier=document.getElementById(`ftr-${sdId}`)?.value;
  const desc=document.getElementById(`fd-${sdId}`)?.value?.trim();
  const ctx=document.getElementById(`fc-${sdId}`)?.value?.trim();
  const di=document.getElementById(`fdi-${sdId}`)?.value?.trim();
  const out=document.getElementById(`fo-${sdId}`)?.value?.trim();
  const rbi=document.getElementById(`fr-${sdId}`)?.value?.trim();
  if(!name){alert('Please enter a use case name.');return;}
  DIVS.forEach(d=>{if(d.departments)d.departments.forEach(dept=>dept.subdepts.forEach(sd=>{
    if(sd.id===sdId){
      if(type==='deep'){
        sd.deepUCs.push({id:`${sdId}.X${sd.deepUCs.length+1}`,name,tier,rbi:!!rbi,cubCtx:ctx||'',pain:desc||'As described.',what:desc||'AIDF enables this capability.',dataInputs:(di||'Finacle CBS').split('·').map(s=>({l:s.trim(),dr:'g'})),outcomes:[out||'As specified.'],buildsOn:[],enables:[],rbiNote:rbi||'',mockup:null});
      }else{sd.briefUCs.push({name,desc:desc||out||'AIDF enables this capability.'});}
      d.ucs++;
    }
  }))});
  oAF[sdId]=false;
  if(view==='div'&&cDiv)showDiv(cDiv.id);
  else if(view==='dept'&&cDept)showDept(cDept.id);
  rSB();
}

function showGAdd(){
  const m=document.createElement('div');
  m.className='modal-bg';
  m.innerHTML=`<div class="modal-box">
    <div class="modal-title">Add Use Case</div>
    <div class="form-row"><label class="form-label">Division *</label>
      <select class="form-select" id="g-div">${DIVS.map(d=>`<option value="${d.id}">${d.num}. ${d.name}</option>`).join('')}</select></div>
    <div class="form-row"><label class="form-label">Department</label>
      <input class="form-input" id="g-dept" placeholder="e.g. Credit Underwriting & Appraisal"></div>
    <div class="form-row"><label class="form-label">Sub-department</label>
      <input class="form-input" id="g-sd" placeholder="e.g. Retail Credit Underwriting"></div>
    <div class="form-row"><label class="form-label">Use case name *</label>
      <input class="form-input" id="g-name" placeholder="e.g. Intelligent credit scoring engine"></div>
    <div class="form-2col">
      <div><label class="form-label">Type</label>
        <select class="form-select" id="g-type"><option value="brief">Brief</option><option value="deep">Deep</option></select></div>
      <div><label class="form-label">Tier</label>
        <select class="form-select" id="g-tier"><option>Quick Win</option><option>Scale-Up</option><option>Transformation</option></select></div>
    </div>
    <div class="form-row"><label class="form-label">Description</label>
      <textarea class="form-textarea" id="g-desc" placeholder="Pain point and what AIDF does..."></textarea></div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveGA()">Save use case</button>
      <button class="btn-cancel" onclick="this.closest('.modal-bg').remove()">Cancel</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
}
function saveGA(){
  const divId=document.getElementById('g-div')?.value;
  const dn=document.getElementById('g-dept')?.value?.trim()||'General';
  const sn=document.getElementById('g-sd')?.value?.trim()||'General';
  const name=document.getElementById('g-name')?.value?.trim();
  const type=document.getElementById('g-type')?.value;
  const tier=document.getElementById('g-tier')?.value;
  const desc=document.getElementById('g-desc')?.value?.trim();
  if(!name){alert('Please enter a use case name.');return;}
  const div=DIVS.find(d=>d.id===divId);
  if(!div.departments)div.departments=[];
  let dept=div.departments.find(d=>d.name===dn);
  if(!dept){dept={id:`${divId}.G${div.departments.length}`,name:dn,subdepts:[]};div.departments.push(dept);div.depts++;}
  let sd=dept.subdepts.find(s=>s.name===sn);
  if(!sd){sd={id:`${dept.id}.G${dept.subdepts.length}`,name:sn,deepUCs:[],briefUCs:[]};dept.subdepts.push(sd);div.subdepts++;}
  if(type==='deep'){sd.deepUCs.push({id:`${sd.id}.X${sd.deepUCs.length+1}`,name,tier,rbi:false,cubCtx:'',pain:desc||'As described.',what:desc||'AIDF enables this.',dataInputs:[{l:'Finacle CBS and relevant data sources',dr:'g'}],outcomes:['As specified.'],buildsOn:[],enables:[],rbiNote:'',mockup:null});}
  else{sd.briefUCs.push({name,desc:desc||'AIDF enables this capability.'});}
  div.ucs++;
  document.querySelector('.modal-bg')?.remove();
  rSB();
  if(view==='div'&&cDiv?.id===divId)showDiv(divId);
  else if(view==='ov')showOv();
}
function pAddD(divId){const n=prompt('Department name:');if(!n)return;const div=DIVS.find(d=>d.id===divId);if(!div.departments)div.departments=[];div.departments.push({id:`${divId}.D${div.departments.length+1}`,name:n,subdepts:[{id:`${divId}.D${div.departments.length+1}.S1`,name:'General',deepUCs:[],briefUCs:[]}]});div.depts++;div.subdepts++;showDiv(divId);}
function pAddSD(dId){const n=prompt('Sub-department name:');if(!n)return;DIVS.forEach(d=>{if(d.departments)d.departments.forEach(dept=>{if(dept.id===dId){dept.subdepts.push({id:`${dId}.S${dept.subdepts.length+1}`,name:n,deepUCs:[],briefUCs:[]});d.subdepts++;}})});if(view==='div'&&cDiv)showDiv(cDiv.id);else if(view==='dept'&&cDept)showDept(cDept.id);}

// INIT
showOv();
</script>
